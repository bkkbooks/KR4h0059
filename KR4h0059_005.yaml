body:
  text: 文章軌範巻五宋謝枋得編小心文有字集此集皆謹嚴簡潔之文場屋中日晷有限巧遲者不如拙速論策結尾畧用此法度主司亦必以異人待之師說韓愈道者致知格物誠意正心齊家治國平天下之道業者六經禮樂文學之業惑者胸中有疑惑而未開眀也古之學者必有師師者所以傳道授業解惑也第一段先立傳道授業解惑三大綱人非生而知之者孰能無惑惑而不從師其爲惑也終不解矣第二段先說解惑不可無師生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生于吾乎是故無貴無賤無長無少道之所存師之所存也第三段說無貴無賤無長無少道之所存即師之所存嗟夫師道之不傳也久矣欲人之無惑也難矣第四段慨嘆後世師道不傳人如何無疑惑古之聖人其出人也逺矣猶且從師而問焉今之衆人其去聖人也亦逺矣而恥學于師是故聖益聖古之人愚益愚今之人聖人之所以爲聖愚人之所以爲愚其皆出於此乎第五段說古之聖人其過人也逺矣猶且從師故聖者益聖今之衆人其不及聖人也逺矣而恥學于師故愚者益愚聖人之所以爲聖愚人之所以爲愚係乎從師不從師而已此是雙關文法要㸔他巧處愛其子擇師而教之於其身也則恥師焉惑矣彼童子之師授之書而習其句讀者也非吾所謂傳其道解其惑者也句讀之不知惑之不解此是雙關文法要看他巧處或師焉或不焉此是于其身也則恥師焉此一段亦是愛其子擇師而教句讀之不知或師焉與小學相貫惑之不解或不焉與大遺相貫此是文公弄巧作文小學而大遺吾未見其明也第六段說今人愛子則擇師而教之所謂師者不過授書習句讀而已至于其身則恥于從師不以傳道解惑爲急童子句讀之不知則爲之擇師其身惑之不解則不擇師是學其小而遺忘其大者可謂不明巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則羣聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近諛嗚呼師道其不復可知矣第七段說巫醫樂師百工之人不恥從師士大夫之族以弟子從之則爲人所笑問其所笑者何事則曰弟子與師年相若道相似或曰弟子位高師位卑則足羞弟子無官師官盛則近諛此四句應無長無少無貴無賤八字巫醫樂師百工之人君子鄙之今其智乃反不能及可怪也歟第八段慨嘆後世不知有師道士大夫之族恥于從師是智不及巫醫樂師百工之人矣聖人無常師萇𢎞師襄老聃郯子之徒其賢不及孔子孔子曰三人行必有我師焉故弟子不必不如師師不必賢於弟子聞道有先後術業有專攻如是而已第九段說孔子無常師問學于萇𢎞問禮于老聃問琴于師襄問官名于郯子遇有事之精者即問之即以師待之此四人者皆不及孔子也論語孔子曰三人行必有我師焉擇其善者而從之其不善者而改之皆吾師也以孔子之事可觀弟子不必不如師師不必賢於弟子聞道在吾前術業有專攻者雖聖人亦師之不以爲恥況衆人乎李氏子蟠年十七好古文六藝經傳皆通習之不拘于時請學于余余嘉其能行古道作師說以貽之第十段收歸弟子李氏子從學之意作師說之因貽遺也獲麟解韓愈麟仁獸麕身牛尾一角角上有肉不食生物不踐生草王者有道則麟出毛蟲三百六十麟為之長為四靈之一麟之爲靈昭昭也言麟之爲靈物甚分明詠於詩毛詩周南有麟之趾一句三字書於春秋春秋魯哀公十四年西狩獲麟二句四字雜出於傳記百家之書厯代史傳所記及諸子百家書皆説麟三句九字此是章法雖婦人小子皆知其為祥也雖婦人小子不出户庭無高見逺識亦知麟出為王者之祥瑞然麟之為物不畜于家然麟之為物不可畜養于人家不常有於天下麟為四靈之一王者之嘉瑞王者有道則麟出不常見于天下其為形也不類麟之形與尋常山澤之獸不相類非若馬牛犬豕豺狼糜鹿然非如六畜之有馬牛犬豕野獸之有豺狼麋鹿常見其形不難辨認然則雖有麟不可知其為麟也雖有麟出山澤間不可知其為麟也角者吾知其為牛牛有角可辨認角類于牛者吾知其為牛鬛者吾知其為馬馬有騣鬛可辨認騣鬛類于馬者吾知其為馬犬豕豺狼麋鹿吾知其為犬豕豺狼麋鹿犬豕豺狼麋鹿六者形狀皆可辨認出于世間吾皆知為犬豕豺狼麋鹿惟麟也不可知惟麟不常出于天下吾亦不知其為麟史記老子傳孔子曰鳥吾知其能飛魚吾知其能㳺獸吾知其能走至于龍則不可知韓文公正是學史記老子傳句法韓文公以蹈襲前言剽竊陳編為恥變化句法便成新竒不可知則其謂之不祥也亦宜有麟而人不可知其為麟則其人謂之不祥也亦宜也雖然麟之出必有聖人在乎位麟為聖人出也雖然五帝三王太平之時麒麟在郊藪麟之出必有五帝三王之聖人在乎位麟乃為聖人而出非無故而出也聖人者必知麟麟之果不為不祥也春秋哀公十四年春西狩獲麟左傳西狩于大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼曰麟也然後取之聖人如孔子者必能知麟有聖人知之可見麟之果不為不祥也又曰麟之所以為麟者以德不以形此一段又高麟乃仁獸為四靈之一麟之所以為麟者以其有德不必論其形之不類若麟之出不待聖人則其謂之不祥也亦宜若麟之出不待聖人在位之時上無五帝三王下無孔子必無人知之則其謂之不祥之物也亦宜矣此篇僅一百八十餘字有許多轉換徃復變化議論不窮第一段說麟為靈物雖婦人小子皆知其為祥第二轉說雖有麟不知其為麟第三轉說馬牛犬豕豺狼麋鹿吾皆知之惟麟不可知第四轉説麟既不可知則其謂之不祥也亦宜第五轉說麟為聖人而出聖人者必知麟既有聖人知之則麟果不為不祥也第六轉説麟之所以為麟者以其為仁獸為靈物不必論其形第七轉說若麟之出不待聖人在位之時則人謂之不祥也亦宜人能熟讀此等文字筆便圎活便能生議論雜說上韓愈此篇主意謂聖君不可無賢臣賢臣不可無聖君聖賢相逢精聚神㑹斯可成天下之大功龍嘘氣成雲喻聖君雲固弗靈于龍也喻賢臣此謂聖君以官爵祿位與賢臣然後賢臣可以立事業賢臣之賢豈能及聖君之聖哉然龍乘是氣聖君任賢臣茫洋窮乎𤣥間薄日月伏光景感震電神變化水下土汨陵谷此謂聖君任賢臣可以立天下之大事成天下之大功變而通神而明有許多勲業雲亦靈怪矣哉賢臣之功業亦非常此謂賢臣之才固亦竒特矣雲龍之所能使爲靈也賢臣遇聖君之任用而後成功業此謂賢臣因聖君能用之而後見其爲賢若龍之靈則非雲之所能使爲靈也此謂若聖君之聖則非人臣之所能使之爲聖也然龍弗得雲無以神其靈矣聖君不得賢臣亦無以成治功此謂然而聖君弗得賢臣無以輔賢於聖德雖有聖人之天資亦不足以成天下之大功其聖德不光明也失其所憑依信不可歟此謂爲人君而無賢臣如人無股肱無耳目失其所憑失其所依信不可歟異哉其所憑依乃其所自爲也此謂異哉聖君之所憑依者賢臣賢臣所爲之事業即聖君之所自爲也易曰雲從龍此謂賢臣必從聖君既曰龍雲從之矣既曰聖君必有賢臣起而輔佐之此謂既有聖君在上賢臣必起而從之矣雜說下韓愈此篇主意謂英雄豪傑必遇知己者尊之以高爵食之以厚祿任之以重權其才斯可以展布世有伯樂知人者伯樂姓孫名陽善相馬天上冇一星名伯樂在天厩星之旁人見孫陽識馬因號之曰伯樂然後有千里馬異材此謂有賢宰相然後有英雄豪傑爲之用千里馬常有異材而伯樂不常有知人者此謂英雄豪傑常有而宰相知人者不常有故雖有名馬異材祇辱于奴𨽻人之手駢死于槽櫪之間駢頭而死言多也高才居下位不以千里稱也不知其爲異材此謂天下雖有英雄豪傑徒受辱于昏君庸相之朝沈滯于小官終身不得行其志不以英雄豪傑稱也馬之千里者一食或盡粟一石才之異乎人者必尊位重祿以任使之此謂英雄豪傑能立大事成大功者必得尊位重祿斯可以展布今食馬者不知其能千里而食也今之養君子不知其爲異材而加禮養此謂養英雄豪傑者不知其能辦大事成大功而不以尊位重祿養之也是馬雖有千里之能食不飽一句三字位不尊力不足二句三字祿不重才美不外見三句五字此章法雖異材亦難展布也且欲與常馬等不可得祿位不足以展布反不如常材安求其能千里也安得見其為異材此謂英雄豪傑雖有立大事成大功之才無尊位無厚祿無重權其才知不可展布其欲與常衆人等而不可得安可求其辦大事成大功哉策之不以其道食之不能盡其材鳴之不能通其意此三句即孟子所謂弗與共天位也弗與治天職也弗與食天祿也非王公尊賢也執策而臨之曰天下無良馬謂天下無異材嗚呼其真無馬耶其真無才耶其真不識馬耶其上之人不識人耶此謂任使之不以其道爵祿之不能盡其材諌不行言不聽而不得以行其志爲宰相者推用其能之爲知人乃曰天下無英雄豪傑嗚呼天下其真無英雄豪傑耶宰相其真不識英雄豪傑耶送薛存義序柳宗元章法句法字法皆好轉換關鎻𦂳謹嚴優柔理長而味永河東薛存義将行起句𦂳切栁子載肉于俎崇酒于觴追而送之江之滸飲食之且告曰凡吏于土者若知其職乎盖民之役非以役民而已也凡民之食于土者出其什一傭乎吏使司平于我也今受其直怠其事者天下皆然豈惟怠之又從而盜之向使傭一夫于家受若直怠若事又盜若貨器則必甚怒而黜罰之矣以今天下多類此而民莫敢肆其怒與黜罰何哉勢不同也勢不同而理同如吾民何有逹于理者得不恐而畏乎存義假令零陵二年矣蚤作而夜思勤力而勞心訟者平賦者均老弱無懐詐暴憎其爲不虚取直也的矣應有關鎻其知恐而畏也審矣吾賤且辱不得與攷績幽明之說于其徃也故賞之以酒肉而重之以辭與發端數語相應送董邵南序韓愈燕趙古稱多感慨悲歌之士董生舉進士連不得志于有司懐抱利器鬱鬱適兹土吾知其必有合也董生豪傑也燕趙之士意氣投合董生勉乎哉一本作行乎哉夫以子之不遇時苟慕義彊仁者皆愛惜焉矧燕趙之士出乎其性者哉董生豪傑不遇時然吾嘗聞風俗與化移易吾惡知其今不異于古所云又恐今日之燕趙非昔日之燕趙聊以吾子之行卜之也燕趙尚有豪傑董生勉乎哉吾因之有所感矣爲我弔望諸君之墓樂毅而觀于其市復有昔時屠狗者乎此亦感慨悲歌之意爲我謝曰明天子在上可以出而仕矣結句瀟灑慷慨送王含秀才序韓愈王含之祖王績字無功嘗作醉鄉記此序以醉鄉記三字生一篇議論下字影状可見其巧此序只從醉鄉記三字得意變化成一篇議論此文公最巧處凡作論可以爲法吾少時讀醉郷記私怪隱居者無所累于世而猶有是言豈誠㫖于味耶及讀阮籍陶潛詩二公皆嗜酒好醉又與醉郷親切乃知彼雖偃蹇不欲與世接然猶未能平其心或爲事物是非相感發於是有託而逃焉者也從醉鄉引得陶阮二人嗜酒者作證若顔氏子操瓢與簞曾參歌聲若出金石彼得聖人而師之汲汲每若不可及其于外也固不暇尚何麯蘖之託而昏冥之逃耶破醉鄉吾又以爲悲醉鄉之徒不遇也合王阮陶三人故添一徒字建中初天子嗣位有意貞觀開元之丕績在廷之臣爭言事當此時醉鄉之後世又以直廢吾既悲醉鄉之文辭而又嘉良臣之烈思識其子孫今子之來見我也無所挾吾猶将張之張者張大誇耀之意況文與行不失其世守渾然端且厚惜乎吾力不能振之而其言不見信於世也于其行姑與之飲酒不脫醉鄉字答李秀才書韓愈愈白故友李觀元賓十年之前示愈别呉中友人詩六章其首章則吾子也盛有所稱引句法元賔行峻潔清其中狹隘不能包容於尋常人不肯苟有論說因䆒其所以于是知吾子非庸衆人字法時吾子在呉中其後愈出在外無因緣相見元賔既沒其文益可貴重思元賔而不見見元賔之所與者則如元賔焉今者辱惠書及文章觀其姓名元賔之聲容恍若相接章法讀其文辭見元賔之知人交道之不汙甚矣子之心有似于吾元賔也文有情思有滋味子之言以愈所爲不違孔子不以雕琢爲工将相從于此愈敢自愛其道而以辭讓爲事乎然愈之所志于古者不惟其辭之好好其道焉爾讀吾子之辭而得其所用心将復有深于是者與吾子樂之況其外之文乎愈頓首送許郢州序韓愈于頔乃一貪酷吏其爲觀察也賦斂苛急見唐書本傳韓文送許郢州崔復州二序皆諷諫之辭可以叅觀于頔爲觀察使性貪而政苛取財賦于州縣者甚急刺史縣令不可爲韓文公作此序以諷諌于頔文有權衡有箴規愈嘗以書自通于于公累數百言其大要言先達之士得人而託之則道德彰而名聞流後進之士得人而託之則事業顯而爵位通下有矜乎能上有矜乎位雖恒相求而不相遇于公不以其言爲不可復書曰足下之言是也于公身居方伯之尊蓄不世之材而能與卑鄙庸陋相應答如影響是非忠乎君而樂乎善以國家之務爲己任者乎欲譏刺其惡必先誇誦其善先誇誦于公之賢正是學孟子道齊宣王易牛事是心足以王矣一段得進諌之道愈雖不敢私其大恩抑不可不謂之知己恒矜而誦之情已至而事不從小人之所不爲也故于使君之行道刺史之事以爲于公贈凡天下之事成於自同而敗於自異爲刺史者常私於其民不以實應乎府爲觀察使者恒急於其賦不以情信乎州雖是以刺史觀察對說作句下字皆有權度一私于其民一急于其賦可見爲刺史賢爲觀察者不賢繇是刺史不安其官觀察使不得其政財已竭而斂不休人已窮而賦愈急其去爲盜也亦幸矣誠使刺史不私於其民觀察使不急於其賦刺史曰吾州之民天下之民也惠不可以獨厚惠獨厚見刺史之仁觀察使亦曰某州之民天下之民也歛不可以獨急斂獨急見觀察使之不仁如是而政不均令不行者未之有也此序本意欲諷觀察使于頔賦斂甚急刺史不能堪乃借刺史與觀察對說辭意輕重不待計量而見若獨說觀察則于公見之必怒矣此文章之妙其前之言者于公既已信而行之矣今之言者其有不信乎縣之於州猶州之於府也有以事乎上有以臨乎下同則成異則敗者皆然也非使君之賢其誰能信之末又勸許公寛其縣其議論始公平辭意始圎備愈於使君非燕遊一朝之好也故其贈行不以頌而以規贈崔復州序韓愈此序諷諫于公與送許郢州序同意此序尤涵蓄只民就窮而斂愈急下民苦之使于公聞之皆勸于公寛賦斂以安州縣以安百姓有地數百里趨走之吏自長史司馬以下數十人其祿足以仁其三族及其朋友故舊樂乎心則一境之人喜不樂乎心則一境之人懼大丈夫官至刺史亦榮矣雖然幽逺之小民其足跡未嘗至城邑苟有不得其所能自直於鄉里之吏者鮮矣況能自辯於縣吏乎能辯于縣吏者鮮矣況能自辨於刺史之庭乎此一段非知田里小民之疾苦者不能言添之庭二字句便不凡由是刺史有所不聞小民有所不宣賦有常而民産無常水旱厲疫之不期民之豐約懸於州句縣令不以言連帥不以信民就窮而斂愈急吾見刺史之難爲也崔君爲復州其連帥則于公崔君之仁足以蘇復人于公之賢足以庸崔君有刺史之榮而無其難爲者收拾前二段将在于此乎愈嘗辱于公之知而舊游於崔君慶復人之将䝉其休澤也於是乎言觀察使賦斂苛急則爲刺史者見其難而不見其榮觀察使賦斂寛緩則爲刺史者見其榮而不見其難以此諷諫于公最切讀李翺文歐陽修予始讀復性書三篇曰此中庸之義疏爾智者識其性當復中庸愚者雖讀此不曉也不作可焉又讀與韓侍郎薦賢書以謂翺特窮時憤世無薦已者故丁寧如此使其得志亦未必然以翺爲秦漢間好事行義之一豪雋亦善論人者也最後讀幽懐賦然後置書而嘆不已復讀不自休恨翺不生於今不得與之交又恨予不得生翺時與翺上下其論也況迺翺一時有道而能文者莫若韓愈愈嘗有賦矣不過羡二鳥之光榮歎一飽之無時爾推是心使光榮而飽則不復云矣若翺獨不然其賦曰衆囂囂而雜處兮咸歎老而嗟卑視予心之不然兮慮行道之猶非怪神堯以一旅取天下後世子孫不能以天下取河北以爲憂嗚呼使當時君子皆易其歎老嗟卑之心爲翺所憂之心則唐之天下豈有亂與亡哉然翺幸不生今時見今之事則憂又甚矣奈何今之人不憂也余行天下見人多矣脫有一人能如翺憂者又皆疏逺與翺無異其餘光榮而飽者一聞憂世之言不以爲狂人則以爲病子不怒則笑之矣嗚呼在位而不肯自憂又禁他人使皆不得憂可嘆也夫讀孟嘗君傳王安石世皆稱孟嘗君能得士士以故歸之而卒賴其力以脫于虎豹之秦嗟乎孟嘗君特雞鳴狗盜之雄耳豈足以言得士不然擅齊之强得一士焉宜可以南面而制秦尚取雞鳴狗盜之力哉雞鳴狗盜之出其門此士之所以不至也此一轉筆力甚健筆力簡而健然一篇得意處只是擅齊之强得一士焉宜可以南面而制秦尚取雞鳴狗盜之力哉先得此數句作此一篇文字然亦是祖述前言韓文公祭田横墓文云當嬴氏之失鹿得一士而可王何五百人之擾擾不能脫夫子於劔鋩豈所寶之非賢抑天命之有常文章軌範巻五
