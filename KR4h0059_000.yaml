body:
  text: 文章軌範總集類提要臣等謹案文章軌範七卷宋謝枋得編枋得有叠山集已著録是集所録漢晉唐宋之文凡六十九篇而韓愈之文居三十一栁宗元歐陽修之文各五蘇洵之文四蘇轍之文十二其餘諸葛亮陶潛杜牧范仲淹王安石李覯李格非辛棄疾人各一篇而已前二卷題曰放膽文後五卷題曰小心文各有批注圈㸃其六卷嶽陽樓記一篇七卷祭田橫文上梅直講書三槐堂銘表忠觀碑後赤壁賦阿房宫賦送李願歸盤谷賦七篇皆有圈㸃而無批注蓋偶無獨見即不填綴以塞白猶古人淳實之意其前出師表歸去來詞乃併圈㸃亦無之則似有所寓意其門人王淵濟跋謂漢丞相晉處士之大義清節乃枋得所深致意非附㑹也前有王守仁序稱為當時舉業而作然凡所標舉動中窽㑹要之古文之法亦不外此矣舊本以王侯將相有種乎七字分標七卷近刻以九重春色醉仙桃七字易之觀第三卷批有先熟王侯兩集之語則此本為枋得原題近刻乃以意改竄之雖無關大義亦足見坊刻之好改古書不可據為典要也乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部八文章軌範目録總集類卷一侯集放膽文卷二王集放膽文卷三將集小心文卷四相集小心文卷五有集小心文卷六種集小心文卷七乎集小心文文章軌範原序宋謝枋得氏取古文之有資於場屋者自漢迄宋凡六十有九篇標揭其篇章句字之法名之曰文章軌範蓋古文之奧不止於是是獨為舉業者設耳夫自百家之言興而後有六經自舉業之習起而後有所謂古文古文之去六經逺矣由古文而舉業又加逺焉士君子有志聖賢之學而専求之於舉業何啻千里然中世以是取士士雖有聖賢之學堯舜其君之志不以是進終不大行於天下蓋士之始相見也必以贄故舉業者士君子求見於君之羔雉耳羔雉之弗飾是謂無禮無禮無所庸于交際矣故夫求工於舉業而不事于古作弗可工也弗工于舉業而求於幸進是僞飾羔雉以网其君也雖然羔雉飾矣而無恭敬之實焉其如羔雉何哉是故飾羔雉者非以求媚於主致吾誠焉耳工舉業者非以要利於君致吾誠焉耳世徒見夫由科第而進者類多狥私媒利無事君之實而遂歸咎於舉業不知方其業舉之時惟欲釣聲利弋身家之腴以茍一旦之得而初未嘗有其誠也鄒孟氏曰恭敬者幣之未將者也伊川曰自灑掃應對可以至聖人夫知恭敬之實在於飾羔雉之前則知堯舜其君之心不在於習舉業之後矣知灑掃應對之可以進於聖人則知舉業之可以達於伊傳周召矣正德丙寅仲秋既望餘姚王守仁序
