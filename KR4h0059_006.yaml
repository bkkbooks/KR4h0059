body:
  text: 文章軌範卷六宋謝枋得編小心文種字集此集才學識三高議論關世教古之立言不朽者如是夫葉水心曰文章不足關世教雖工無益也人能熟此集學進識進而才亦進矣前出師表諸葛亮先帝創業未半而中道崩殂今天下三分益州罷弊此誠危急存亡之秋也然侍衛之臣不懈于內忠志之士忘身于外者蓋追先帝之殊遇欲報之于陛下也誠宜開張聖聽以光先帝遺德恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使內外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能禆補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵以為督愚以為營中之事事無大小悉以咨之必能使行陳和睦優劣得所也親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨于桓靈也侍中尚書陳震長史參軍蔣琬此悉貞亮死節之臣也願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕於南陽苟全性命于亂世不求聞達于諸侯先帝不以臣卑鄙猥自枉屈三顧臣于草廬之中咨臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任于敗軍之際奉命于危難之間爾來二十有一年矣先帝知臣謹慎故臨崩託臣以大事也受命以來夙夜憂慮恐付託不效以傷先帝之明故五月渡瀘深入不毛今南方已定甲兵已足當奬帥三軍北定中原庶竭駑鈍攘除姦凶興復漢室還于舊都此臣之所以報先帝而忠陛下之職分也至于斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈責攸之禕允等之咎以彰其慢陛下亦宜自謀以咨諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕泣不知所云送浮屠文暢師序韓愈人固有儒名而墨行者問其名則是校其行則非可以與之遊乎如有墨名而儒行者此是文暢問其名則非校其行則是可以與之遊乎揚子雲稱在門墻則麾之喻儒名者在夷狄則進之喻墨名者吾取以為法焉浮屠文暢喜文章文公取文暢只以其人喜文章其周遊天下凡有行必請于縉紳先生以求詠歌其所志貞元十九年春將行東南柳君宗元為之請解其裝得所敘詩纍百餘篇非至篤好其何能致多如是耶惜其無以聖人之道告之者而徒舉浮屠之説贈焉夫文暢浮屠也如欲聞浮屠之説當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物禮樂之盛其心有慕焉拘其法而未能入句法故樂聞其説而請之如吾徒者宜當告之以二帝三王之道日月星辰之所以行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之説而瀆告之也此一段最高民之初生固若禽獸夷狄然有聖人者立然後知宫居而粒食親親而尊尊生者養死者藏是故道莫大乎仁義教莫正乎禮樂刑政施之于天下萬物得其宜措之于其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之于册中國之人世守之今浮屠者孰為而孰傳之耶此一段義理最精亦切近人情即是原道中議論無一語相似此韓文之所以為竒特也夫鳥俯而啄仰而四顧夫獸深居而簡出懼物之為已害也猶且不免焉弱之肉強之食今吾與文暢安居暇食優遊以生死與禽獸異者寧可不知其所自耶此一段尤切近人情見得天地間不可無聖人之道無聖人之道則人之類滅久矣與禽獸何異夫不知者非其人之罪也知而不為之者惑也恱乎故不能即乎新者弱也知而不以告之者不仁也告而不以實者不信也此二節是儒者之過余既重栁請又嘉浮屠能喜文辭於是乎言見得文公所以與文暢者只是取其能喜文章非取其道栁子厚墓志韓愈此篇係節文今依元本刊行如左其召至京師而復為刺史也中山劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請于朝將拜疏願以栁易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕恱酒食遊戲相徴逐詡詡強笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髮比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也此宜禽獸夷狄所不忍為而其人自視以為得計聞子厚之風亦可以少愧矣子厚前時少年勇于為人不自貴重顧藉謂功業可立就故坐廢退子厚黨附王伾王叔文得罪貶永州司馬既退又無相知有氣力得位者推挽故卒死于窮裔子厚終于栁州刺史材不為世用道不行于時也使子厚在臺省時自持其身已能如司馬刺史時亦自不斥斥時有人力能舉之且必復用不窮然子厚斥不久窮不極雖有出于人其文學辭章必不能自力以致必傳于後世如今無疑也此三節議論有斷制有回斡有馳驟意氣激昂光彩燦爛一節高一節文章之妙如此寧幾雖使子厚得所願為將相于一時以彼易此孰得孰失必有能辨之者大唐中興頌序元結天寶十四年安祿山陷洛陽明年陷長安天子幸蜀唐明皇太子即位于靈武肅宗不受命于父而自立與篡位同明年皇帝移軍鳳翔太子立則稱皇帝其年復兩京上皇還京師天子退位則稱上皇於戲前代帝王有盛德大業者必見于歌頌前代帝王有德有功者見于歌頌若今歌頌大業刻之金石今日無盛德有大業而見于歌頌非老於文學其誰宜為書箕子廟碑隂柳宗元當其周時未至殷祀未殄比干已死微子已去向使紂惡未稔而自斃武庚念亂以圖存國無其人誰與興理此人事之或然者也先生所以隱忍而不去意者有在於斯乎此等文章天地間有數不可多見惟杜牧之絶句詩一首似之題烏江項羽廟云勝敗兵家不可期包羞忍恥是男兒江東子弟多豪俊卷土重來未可知嚴先生祠堂記范仲淹字少意多文簡理詳有關世教非徒文也先生光武之故人也相尚以道及帝握赤符乘六龍得聖人之時臣妾億兆好句法天下孰加焉惟先生以節高之既而動星象歸江湖得聖人之清泥塗軒冕句法天下孰加焉惟光武以禮下之在蠱之上九衆方有為而獨不事王侯高尚其事先生以之在屯之初九陽德方亨而能以貴下賤大得民也光武以之蓋先生之心出乎日月之上光武之量包乎天地之外微先生不能成光武之大微光武豈能遂先生之高哉而使貪夫廉懦夫立是大有功于名教也斡歸立祠意仲淹來守是邦始構堂而奠焉乃復為其後者四家復者漢法免租賦科役也以奉祠事又從而歌曰雲山蒼蒼江水泱泱先生之風山高水長范文正公作此記李太伯在坐間曰公此文一出名世只一字未安公曰何字曰先生之德不如以風字代德字公欣然改之蓋太伯因記中有貪夫廉懦夫立六字遂思聞伯夷栁下惠之風一假因得風字也跋紹興辛巳親征詔草辛棄疾使此詔見于紹興之前可以無事讐之大恥使此詔行于隆興之後可以卒不世之大功今此詔與此敵猶俱存也悲夫袁州學記李覯本朝大儒作學記多矣三百年來人獨喜誦袁州學記非曰筆端有氣力有光焰超然不羣其立論高逺宏大不離乎人心天理宜乎讀者樂而忘倦也葉水心云為文不足關世教雖工無益也可與知者道皇帝二十有二年仁宗慶厯四年制詔州縣立學惟時守令有哲有愚有屈力殫慮祗順德意句法有假宫借師苟具文書句法或連數城亡絃誦聲倡而不和教尼不行句法三十有二年仁宗至和元年范陽祖君無擇知袁州始至進諸生知學宫闕狀字法大懼人才放失字法儒效闊疏無以稱上意旨通判潁州陳君侁聞而是之字法議以克合相舊夫子廟狹隘不足改為乃營治之東北隅厥土燥剛厥位面陽厥材孔良殿堂門廡黝堊丹漆舉以法故生師有舍庖廪有次百爾器備並手偕作工善吏勤晨夜展力越明年成舍菜且有日旴江李覯諗于衆曰惟四代之學考諸經可見已作學記不説虞夏商周自是欠事今只以一句道破筆力高古秦以山西鏖六國欲帝萬世劉氏一呼而關門不守武夫健將賣降恐後何耶詩書之道廢人惟見利而不聞義焉耳孝武乘豐富世祖出戎行皆孳孳學術俗化之厚延於靈獻草茅危言者折首而不悔功烈震主者聞命而釋兵羣雄相視不敢去臣位尚數十年教道之結人心如此一句結有筆力今代遭聖神爾袁得聖君句法俾爾由庠序踐古人之迹天下治則撢禮樂以陶吾民一有不幸猶當伏大節為臣死忠為子死孝此等文章關係世教萬世不磨滅使人有所賴且有所法是惟朝家教學之意若其弄筆墨以徼利達而已豈徒二三子之羞抑亦為國者之憂袁州學記李太伯文河東柳淇書京兆章友真篆稱為三絶書洛陽名園記後李格非名園特遊觀之末今張大其事恢廣其意謂園囿之興廢乃洛陽盛衰之候洛陽之盛衰乃天下治亂之候是至小之物關係至大有學有識方能為此文洛陽處天下之中挾殽黽之阻當秦隴之襟喉而趙魏之走集蓋四方必爭之地也天下當無事則已有事則洛陽必先受兵余故嘗曰洛陽之盛衰天下治亂之候也方唐貞觀開元之間公卿貴戚開館列第于東都者號千有餘邸及亂離繼以五季之酷其池塘竹樹兵車蹂蹴廢而為丘墟高亭大榭煙火焚燎化而為灰燼與唐共滅而俱亡無餘處矣余故嘗曰園囿之興廢洛陽盛衰之候也且天下之治亂候于洛陽之盛衰而知洛陽之盛衰候于園囿之興廢而得則名園記之作余豈徒然哉有此文章方可傳不然虛辭浮語雖工何可傳嗚呼公卿大夫方進于朝放乎一已之私自為之而忘天下之治忽欲退享此得乎唐之末路是已嶽陽樓記范仲淹慶厯四年春滕子京謫守巴陵郡越明年政通人和百廢具興乃重修嶽陽樓增其舊制刻唐賢今人詩賦于其上屬豫作文以記之豫觀夫巴陵勝狀在洞庭一湖銜逺山吞長江浩浩湯湯橫無際涯朝暉夕隂氣象萬千此則嶽陽樓之大觀也前人之述偹矣然則北通巫峽南極瀟湘仙客騷人多會于此覽物之情得無異乎若夫霪雨霏霏連月不開隂風怒號濁浪排空日星隱耀山嶽潛形商旅不行檣傾楫摧薄暮冥冥虎嘯猿啼登斯樓也則有去國懷鄉憂讒畏譏滿目蕭然感極而悲者矣至若春和景明波瀾不驚上下天光一碧萬頃沙鷗翔集錦鱗遊泳岸芷汀蘭郁郁青青而或長煙一空皓月千里浮光躍金靜影沉碧漁歌互答此樂何極登斯樓也則有心曠神怡寵辱皆忘把酒臨風其喜洋洋者矣嗟夫豫嘗求古仁人之心或異二者之為何哉不以物喜不以已悲居廟堂之高則憂其民處江湖之逺則憂其君是進亦憂退亦憂然則何時而樂耶其必曰先天下之憂而憂後天下之樂而樂歟噫微斯人吾誰與歸文章軌範卷六
