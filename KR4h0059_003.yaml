body:
  text: 文章軌範卷三宋謝枋得編小心文將字集議論精眀而斷制文勢圎活而婉曲有抑揚有頓挫有擒縱場屋程文論當用此樣文法先暗記侯王兩集下筆無滯礙便當讀此管仲論蘇洵管仲相威公霸諸侯攘夷狄終其身齊國富強諸侯不敢叛管仲死豎刁易牙開方用威公薨于亂五公子爭立其禍蔓延訖簡公齊無寧嵗公子武孟公子元公子潘公子商人公子雍公子昭昭立是為孝公故曰五公子夫功之成非成於成之日蓋必有所由起禍之作不作于作之日亦必有所由兆文有斷制故齊之治也吾不曰管仲而曰鮑叔鮑叔薦管仲威公用之及其亂也吾不曰豎刁易牙開方而曰管仲何則豎刁易牙開方三子彼固亂人國者顧其用之者威公也夫有舜而後知放四凶有仲尼而後知去少正卯彼威公何人也顧其使威公得用三子者管仲也仲之疾也公問之相當是時也吾意以仲且舉天下之賢者以對而其言乃不過曰豎刁易牙開方三子非人情不可近而已嗚呼仲以為威公果能不用三子矣乎仲與威公處幾年矣亦知威公之為人矣乎威公聲不絶乎耳色不絶於目而非三子者則無以遂其欲彼其初之所以不用者徒以有仲焉耳一日無仲則三子者可以彈冠而相慶矣仲以為將死之言可以縶威公之手足耶夫齊國不患有三子而患無仲有仲則三子者三匹夫耳不然天下豈少三子之徒哉雖威公幸而聽仲誅此三人其餘者仲能悉數而去之耶嗚呼仲可謂不知本者矣因威公之問舉天下之賢者以自代則仲雖死而齊國未為無仲也夫何患三子者不言可也此一段是代管仲為謀文章最高處既攻擊管仲須是思量吾身生管仲之時居管仲之位為管仲之事當如何處置必有一䇿東坡作鼂錯論范增論皆用此法五伯莫盛於威文文公之才不過威公其臣又皆不及仲狐偃趙衰先軫陽處父靈公之虐文公子不如孝公之寬厚威公子文公死諸侯不敢叛晉晉襲文公之餘威猶得為諸侯之盟主百餘年何者其君雖不肖而尚有老成人焉威公之薨也一敗塗地無惑也彼獨恃一管仲而仲則死矣夫天下未嘗無賢者蓋有有臣而無君者矣威公在焉而曰天下不復有管仲者吾不信也仲之書有記其將死論鮑叔賓胥無之為人且各疏其短此事見管子是其心以為是數子者皆不足以托國而又逆知其將死則其書誕謾不足信也吾觀史鰌以不能進蘧伯玉而退彌子瑕故有身後之諫蕭何且死舉曹參以自代大臣之用心固宜如此也先得此二事為證然後立論夫國以一人興以一人亡賢者不悲其身之死而憂其國之衰故必復有賢者而後可以死彼管仲者何以死哉高祖論蘇洵此論因高祖命平勃即軍中斬樊噲事有所見遂作一段文字知有吕氏之禍而用周勃不去吕后二事皆是窮思極慮刻苦作文非淺學所到必熟讀暗記方知其好漢高祖挾數用術以制一時之利害不如陳平揣摩天下之勢舉足搖目以劫制項羽不如張良微此二人則天下不歸漢而高帝乃木強上聲之人而止耳然天下已定後世子孫之計陳平張良智之所不及則高帝常先為之規畫處置使中後世之所為曉然如目見其事而為之者蓋高帝之智明于大而暗于小至于此而後見也此一段如論之冒頭帝嘗語吕后曰周勃厚重少文然安劉氏必勃也可令為太尉方是時劉氏安矣勃又將誰安耶故吾之意曰高帝之以太尉屬勃也知有吕氏之禍也此一問可見老泉讀書有眼力作文有筆力衆人讀漢書然安劉氏必勃可令為太尉二句只説高帝知勃重厚可當大事誰能思量劉氏既安矣勃又將誰安耶高帝之以太尉屬勃也知有吕氏之禍也四句老泉學識未易及也雖然其不去吕后何也勢不可也昔者武王沒成王幼而三監叛帝意百嵗後將相大臣及諸侯王有如武庚祿父而無有以制之也獨計以為家有主母而豪奴悍婢不敢與弱子抗吕氏佐帝定天下為諸將大臣素所畏服獨此可以鎮壓其邪心以待嗣子之壯故不去呂后者為惠帝計也又揣摩髙帝不去吕后之意作一段議論皆是駕空憑虛自出新意無中生有文法最高此一段如論之原題吕后既不可去故削其黨以損其權使雖有變而天下不搖是故以樊噲之功一旦遂欲斬之而無疑嗚呼彼獨於噲不仁耶且噲與帝偕起拔城陷陳功為不少方亞夫嗾項莊時微噲誚讓羽則漢之為漢未可知也一旦人有惡噲欲滅戚氏者時噲出伐燕立命平勃即軍中斬之夫噲之罪未形也惡之者誠偽未必也且帝之不以一女子斬天下功臣亦明矣彼其娶于吕氏吕氏之族若産祿輩皆庸才不足恤獨噲豪傑諸將所不能制後世之患無大于此者矣本以高帝病中命平勃斬樊噲事有所見遂作高祖論前面不説破必逐節出新意立竒論直到此方入事夫高帝之視吕后猶醫者之視堇也使其毒可以治病而不至于殺人而已噲死則吕氏之毒將不至于殺人高帝以為是足以死而無憂矣彼平勃者遺其憂者也噲之死于惠帝之六年天也使其尚在則吕祿不可紿太尉不得入北軍矣此一段如論之講題或謂噲于高帝最親使之尚在未必與祿産叛夫韓信黥布盧綰皆南面稱孤而綰又最為親幸然及高祖之未亡也皆相繼以逆誅誰謂百嵗之後椎埋屠狗之人見其親戚得為帝王而不欣然從之耶吾故曰彼平勃者遺其憂者也此一段如論之結尾此篇以高帝命平勃即軍中斬樊噲一事立一篇議論斬樊噲如一篇題目命周勃為太尉一事如論之原題高帝不去吕后者正為惠帝計斬樊噲可以去吕氏之黨制吕氏之變論之主意春秋論蘇洵此文有法度有氣力有精神有光焰謹嚴而華藻者也讀得孟子熟方有此文章賞罰者天下之公也是非者一人之私也位之所在則聖人以其權為天下之公而天下以懲以勸道之所在則聖人以其權為一人之私而天下以榮以辱周之衰也位不在夫子而道在焉夫子以其權是非天下可也而春秋賞人之功赦人之罪去人之族絶人之國貶人之爵諸侯而或書其名大夫而或書其字不惟其法惟其意不徒曰此是此非而賞罰加焉則夫子固曰我可以賞罰人矣賞罰人者天子諸侯事也夫子病天下之諸侯大夫僣天子諸侯之事而作春秋而已則為之其何以責天下位公也道私也私不勝公則道不勝位位之權得以賞罰而道之權不過于是非道在我矣而不得為有位者之事則天下皆曰位之不可僣也如此不然天下其誰不曰道在我則是道者位之賊也一難曰夫子豈誠賞罰之耶徒曰賞罰之耳庸何傷一解曰我非君也非吏也執塗之人而告之曰某為善某為惡可也繼之曰某為善吾賞之某為惡吾誅之則人有不笑我者乎夫子之賞罰何以異此然則何足以為夫子何足以為春秋二難曰夫子之作春秋也非曰孔氏之書也又非曰我作之也賞罰之權不得以自與也曰此魯之書也魯作之也有善而賞之曰魯賞之也有惡而罰之曰魯罰之也一篇主意正在此何以知之曰夫子繫易謂之繫辭言孝謂之孝經皆自名之則夫子私之也而春秋者魯之所以名史而夫子託焉則夫子公之也公之以魯史之名而賞罰之權固在魯矣二解春秋之賞罰自魯而及于天下天子之權也魯之賞罰不出境而以天子之權與之何也三難曰天子之權在周夫子不得已而以與魯也武王之崩也天子之位當在成王而成王幼周公以為天下不可以無賞罰故不得已而攝天子之位以賞罰天下以存周室周之東遷也天下之權當在平王平王昏亂故夫子亦曰天下不可以無賞罰而魯周公之國也居魯之地宜如周公不得已而假天子之權以賞罰天下以尊周室故以天子之權與之也三解然則假天子之權宜如何四難曰如齊桓晉文可也四解夫子欲魯如齊桓晉文而不遂以天子之權與齊晉何也五難齊桓晉文陽為尊周而實欲富強其國故夫子與其事而不與其心周公心存王室雖其子孫不能繼而夫子思周公而許其假天子之權以賞罰天下其意曰有周公之心而後可以行桓文之事此其所以不與齊晉而與魯也又生一段議論夫子亦知魯君之才不足以行周公之事矣顧其心以為今之天下無周公故至此是故以天子之權與其子孫所以見思周公之意也此一段直是論得痛快感動人吾觀春秋之法皆周公之法而又詳內而略外此其意欲魯法周公之所為且先自治而後治人也明矣夫子嘆禮樂征伐自諸侯出而田恆弒其君則沐浴而請討然則天子之權夫子固明以與魯矣五解子貢之徒不達夫子之意續經而書孔丘卒夫子既告老矣大夫告老而卒不書而夫子獨書夫子作春秋以公天下而豈私一孔丘哉嗚呼夫子以為魯國之書而子貢之徒以為孔氏之書也歟遷固之史有是非而無賞罰彼亦史臣之體宜爾也結尾後之效孔子作春秋者吾惑焉吕氏春秋吳越春秋春秋有天子之權天下有君則春秋不當作天下無君則天子之權吾不知其誰與天下之人烏有如周公之後之可與者與之而不得其人則亂不與人而自與則僣不與人不自與而無所與則散嗚呼後之春秋亂耶僣耶散耶范增論蘇軾漢用陳平計間疏楚君臣項羽疑范增與漢有私稍奪其權增大怒曰天下事大定矣君王自為之願賜骸骨歸卒伍歸未至彭城疽發背死蘇子曰增之去善矣不去羽必殺增獨恨其不早耳然則當以何事去增勸羽殺沛公羽不聽終以此失天下當于是去耶曰否增之欲殺沛公人臣之分也羽之不殺猶有君人之度也增曷為以此去哉易曰知幾其神乎詩曰如彼雨雪先集維霰增之去當于羽殺卿子冠軍時也陳涉之得民也以項燕扶蘇項氏之興也以立楚懷王孫心而諸侯叛之也以弒義帝義帝命宋義為上將號曰卿子冠軍後為項羽所殺陳涉初起兵假楚將項燕秦太子扶蘇為名二人已死矣陳涉詐稱其尚在感動人心楚懷王入秦無罪而亡楚人憐之南公曰楚雖三户亡秦必楚范增勸楚項梁求懷王孫名心者立以為楚懷王項羽陽尊懷王為義帝後隂使人弒義帝江中且義帝之立增為謀主矣義帝之存亡豈獨為楚之盛衰亦增之所與同禍福也未有義帝亡而增獨能久存者也羽之殺卿子冠軍也是弒義帝之兆也其弒義帝則疑增之本也豈必待陳平哉物必先腐也而後蟲生之人必先疑也而後讒入之陳平雖智安能間無疑之主哉吾嘗論義帝天下之賢主也獨遣沛公入關不遣項羽識卿子冠軍于稠人之中而擢以為上將不賢而能如是乎羽既矯殺卿子冠軍義帝必不能堪非羽弒帝則帝殺羽不待智者而後知也增始勸項梁立義帝諸侯以此服從中道而弒之非增之意也夫豈獨非其意將必力爭而不聽也不用其言而殺其所立羽之疑增必自是始矣方羽殺卿子冠軍增與羽比肩而事義帝君臣之分未定也為增計者力能誅羽則誅之不能則去之豈不毅然大丈夫也哉此一段最妙乃無中生有死中求活增年已七十合則留不合則去不以此時明去就之分而欲依羽以成功名陋矣雖然增高帝之所畏也增不去項羽不亡嗚呼增亦人傑也哉結尾不貶盡范增反許之為人傑正如韓文公爭臣論攻擊不遺餘力結句乃曰陽子將不得為善人乎如此方是公論若斷人之過攻人之惡沒人之善皆非老手此是東坡海外文字一句一字增減不得句句有法字字盡心後生只熟讀暗記此一篇義理融明音律諧和下筆作論必驚世絶俗此論最好處在方羽殺卿子冠軍時增與羽比肩事義帝一段當與鼂錯論並觀凡作史評斷古人是非得失存亡成敗如明官判斷大公案須要説得人心服若只能責人亦非高手須要思量我若生此人之時居此人之位遇此人之事當如何應變當如何全身必有至當不易之説如奕棊然敗棊有勝著勝棊有敗著得失在一著之間棊師旁觀必能覆棊歷説勝者亦可敗敗者亦可勝乃為良工東坡作史評皆得此説人不能知能知此者必長於作論鼂錯論蘇軾此論先立冒頭然後入事乂是一格老于世故明于人情有憂深思逺之智有排難解紛之勇不特文章之工也天下之患最不可為者名為治平無事而其實有不測之憂暗説景帝時諸侯強大削亦反不削亦反此如破題坐觀其變而不為之所則恐至于不可救起而強為之則天下狃于治平之安而不吾信此如破題惟仁人君子豪傑之士為能出身為天下犯大難以求成大功此固非勉強期月之間而苟以求名之所能也暗説鼂錯削七國事天下治平暗説景帝時無故而發大難之端暗説削七國吾發之吾能收之然後有辭于天下暗説七國反事至而循循焉欲去之使他人任其責暗説鼂錯欲使天子自將而已居守則天下之禍必集於我此袁盎所以進斬鼂錯之説昔者鼂錯盡忠為漢謀弱山東之諸侯山東諸侯並起以誅錯為名而天子不之察以錯為説天下悲錯之以忠而受禍不知錯有以取之也古之立大事者不惟有超世之才亦必有堅忍不拔之志昔禹之治水鑿龍門決大河而放之海方其功之未成也蓋亦有潰冒衝突可畏之患惟能前知其當然事至不懼而徐為之圖是以得至于成功用大禹治水事乃是學司馬相如難蜀父老丈夫以七國之強而驟削之其為變豈足怪哉錯不于此時捐其身為天下當大難之衝而制吳楚之命乃為自全之計景帝之怒錯錯之受禍果是因此非假設之辭欲使天子自將而已居守主意在此且夫發七國之難者誰乎已欲求其名安所逃其患以自將之至危與居守之至安已為難首擇其至安而遺天子以其至危此忠臣義士所以憤惋而不平者也此一段判斷鼂錯之罪至公至平錯聞之亦必心服當此之時雖無袁盎錯亦未免于禍何者已欲居守而使人主自將以情而言天子固已難之矣而重違其議是以袁盎之説得行于其間使吳楚反錯以身任其危日夜淬礪東向而待之使不至于纍其君則天子將恃之以為無恐雖有百盎可得而間哉此一段最妙乃是無中生有死中求活方成議論凡作史評判斷古今之功罪須要思量使我生此人之時居此人之位處此人之事當如何處置必有一長䇿如奕棊然雖敗局未嘗無勝勢雖勝局未嘗無敗勢善奕者能知之嗟夫世之君子欲求非常之功則無務為自全之計使錯自將而討吳楚未必無功此是高見逺識深謀至論惟其欲自固其身而天子不恱姦臣得以乘其隙錯之所以自全者乃其所以自禍歟留侯論蘇軾主意謂子房本大勇之人唯年少氣剛不能涵養忍耐以就大功名如用力士提鐵鎚擊秦始皇之類皆不能忍老父之圯音怡論中同下始命之取履納履與之期五更相會數怒罵之正以折其不能忍之氣教之以能忍也古之所謂豪傑之士必有過人之節人情有所不能忍者匹夫見辱拔劍而起挺身而鬬此不足為勇也能忍不能忍是一篇主意天下有大勇者卒然臨之而不驚無故加之而不怒此其所挾持者甚大而其志甚逺也好句法夫子房授書于圯上之老人也其事甚怪當看漢書張良傳知此本末然亦安知其非秦之世有隱君子者出而試之觀其所以微見其意者皆聖賢相與警戒之義而世不察以為鬼物亦已過矣且其意不在書當韓之亡秦之方盛也以刀鋸鼎鑊待天下之士其平居無事夷滅者不可勝數雖有賁育無所復施夫持法太急者其鋒不可犯而其勢未可乘子房不忍忿忿之心以匹夫之力而逞于一擊之間當此之時子房之不死者其間不能容髮蓋亦危矣此時子房尚不能忍此事見子房傳得力士提鐵鎚重百斤以擊秦始皇于博浪沙中誤中副車始皇怒大索天下十日竟不獲千金之子不死于盜賊何者其身可愛而盜賊之不足以死也子房以蓋世之才不為伊尹太公之謀而特出于荆軻聶政之計兩刺客以僥幸于不死此圯上老人所為深惜者也是故倨傲鮮腆而深折之彼其能有所忍也然後可以就大事故曰孺子可教也此是老父墮履橋下命子房取履又命之納履與子房期以五更相會于橋上子房後至怒為一段事老父正以折子房少年剛強不能忍之氣使之能客忍楚莊王伐鄭鄭伯肉袒牽羊以迎莊王曰其君能下人必能信用其民矣遂舍之宣公十二年勾踐之困於會稽而歸臣妾于吳者三年而不倦且夫有報人之志而不能下人者是匹夫之剛也夫老人者以為子房才有餘而憂其度量之不足故深折其少年剛鋭之氣使之忍小忿而就大謀何則非有平生之素卒然相遇于草野之間暗説圯上相遇而命以僕妾之役暗説取履事油然而不怪者此固秦皇之所不能驚而項籍之所不能怒也觀夫高祖之所以勝項籍之所以敗者在能忍與不能忍之間而已矣項籍唯不能忍是以百戰百勝而輕用其鋒高祖忍之養其全鋒而待其弊此子房教之也因子房能忍又教得高帝能忍所以得天下此一段議論尤高當淮隂破齊而欲自王高祖發怒見于詞色由是觀之猶有剛強不能忍之氣非子房其誰全之引證大史公疑子房以為魁梧竒偉而其狀貌乃如婦人女子不稱其志氣嗚呼此其所以為子房歟秦始皇扶蘇論蘇軾秦始皇時趙高有罪蒙毅按之當死始皇赦而用之長子扶蘇好直諌上怒使北監蒙恬兵于上郡始皇東遊會稽並蒲浪反海走音奏琅琊次子胡亥李斯蒙毅趙高從道病使蒙毅還禱山川未及還上崩李斯趙高矯詔立胡亥殺扶蘇蒙恬蒙毅卒以亡秦蘇子曰始皇制天下輕重之勢使內外相形以禁姦備亂可謂密矣蒙恬將三十萬人威震北方扶蘇監其軍而蒙毅侍帷幄為謀臣雖有大姦賊敢睥睨其間哉不幸道病禱祠山川尚有人也而遣蒙毅故高斯得成其謀始皇之遣毅毅見始皇病太子未立而去左右皆不可以言智雖然天之亡人國其禍敗必出于智之所不及聖人為天下不恃智以防亂恃其無致亂之道耳始皇致亂之道在用趙高夫閹尹之禍如毒藥猛獸未有不裂肝碎首者也自有書契以來惟東漢吕強後唐張承業二人號稱善良豈可望一二于千萬以取必亡之禍哉然世主皆甘心而不悔如漢桓靈唐肅代猶不足深怪始皇漢宣皆英主亦沉于趙高恭顯之禍彼自以為聰明人傑也奴僕薰腐之餘何能為及其亡國亂朝乃與庸主不異吾故表而出之以戒後世人主如始皇漢宣者或曰李斯佐始皇定天下不可謂不智扶蘇親始皇子秦人戴之久矣陳勝假其名猶足以亂天下而蒙恬持重兵在外使二人不即受誅而復請之則斯高無遺類矣以斯之智而不慮此何哉蘇子曰嗚呼秦之失道有自來矣豈獨斯高之罪自商鞅變法以殊死為輕典以參夷為常法人臣狼顧脅息以得死為幸何暇復請方其法之行也求無不獲禁無不止鞅自以為軼堯舜而駕湯武矣及其出亡而無所舍然後知為法之弊夫豈獨鞅悔之秦亦悔之矣形容商鞅之慘刻秦法之酷烈可謂盡矣荆軻之變持兵者熟視始皇環柱而走而莫之救者以法重故也李斯之立胡亥不復忌二人者知威令之素行而臣子不敢復請也答前一段問二人之不敢復請亦知始皇之鷙悍而不可回也豈料其偽也哉周公曰平易近民民必歸之孔子曰有一言而終身行之其恕矣乎夫以忠恕為心而以平易為政則上易知下易達雖有賣國之姦無所投其隙倉卒之變無自發焉其令行禁止蓋有不及商鞅者矣而聖人終不以此易彼蘇東坡作史評必有一段説萬世不可磨滅之理使吾身生其人之時居其人之位遇其人之事當如何處置此作論妙法從老泉傳來今人作場屋程文論當以此為法凡議論好事須要一段反説凡議論不好事須要一段正説文勢亦圎活義理亦精微意味亦悠長鞅立信于徙木立威于棄灰刑其親戚師傅無惻容積威信之極以至始皇秦人視其君如雷電鬼神不可測識古者公族有罪三宥而後致刑今至使人矯殺其太子而不忌太子亦不敢請則威信之過也夫以法毒天下者未有不反中其身及其子孫皆是至人之言漢武始皇皆果于殺者也故其子如扶蘇之仁則寧死而不請如戾太子之悍則寧反而不訴知訴之必不察也戾太子豈欲反者哉計出于無聊也故為二君之子者有死與反而已李斯之智蓋足以知扶蘇之必不反也答前段設問吾又表而出之以戒後世人主之果於殺者此論主意有兩説斯高矯詔立胡亥殺扶蘇蒙恬蒙毅其禍不在于蒙毅之去左右而在于始皇之用趙高後世人主用宦官者當以為戒一説李斯趙高敢于矯詔殺扶蘇蒙恬而不憂二人之復請者其禍不在于斯高之亂而在于商鞅之變法始皇之好殺後世人主之果于殺者當以為戒前一段説始皇罪在用趙高附入漢宣任恭顯事後一假説始皇之果于殺其禍反及其子孫附入漢武殺戾太子事此文法尤妙王者不治夷狄論蘇軾此是東坡應制科程文六論中之一有冒頭有原題有講題有結尾當熟讀當暗記始知其巧夷狄不可以中國之治治也譬若禽獸然求其大治必至于大亂句有氣力先王知其然是故以不治治之治之以不治者乃所以深治之也春秋書公會戎于潛何休曰王者不治夷狄録戎來者不拒去者不追也此是冒頭夫天下之至嚴而用法之至詳者莫如春秋凡春秋之書公書侯書字書名其君得為諸侯其臣得為大夫者舉皆齊晉也不然則齊晉之與國也其書州書國書氏書人其君不得為諸侯其臣不得為大夫者舉皆秦楚也不然則秦楚之與國也夫齊晉之君所以治其國家擁衛天子而愛養百姓者豈能盡如古法哉蓋亦出于詐力而參之以仁義是齊晉亦未能純為中國也秦楚者亦非皆貪冒無恥肆行而不顧也蓋亦有秉道行義之君焉是秦楚亦未至于純為夷狄也齊晉之君不能純為中國而春秋之所與者常在焉有善則汲汲而書之惟恐其不得聞于後世有過則多方而開赦之惟恐其不得為君子秦楚之君未至于純為夷狄而春秋之所不與者常在焉有善則纍而後進有惡則略而不録以為不足録也是非獨私于齊晉而偏疾于秦楚也以見中國之不可以一日背夷狄之不可一日向也其不純者不足以寄其褒貶則其純者可知矣故曰天下之至嚴而用法之至詳者莫如春秋此是原題夫戎者豈特如秦楚之流入于戎狄而已哉然而春秋書之曰公會戎于潛公無所貶而戎為可會是獨何歟夫戎之不能以會禮會公亦明矣此學者之所以深疑而求其説也故曰王者不治夷狄録戎來者不拒去者不追也夫以戎之不可以化誨懷服也彼其不悍然執兵以與我從事于邉鄙固亦幸矣又況知有所謂會者而欲行之是豈不足以深嘉其意乎不然將深責其禮彼將有所不堪而發其暴怒則其禍大矣仲尼深憂之故因其來而書之以會曰若是足矣是將以不治深治之也此是講題由是觀之春秋之疾戎狄者非疾純戎狄也疾其以中國而流入于戎狄者也此是結尾荀卿論蘇軾嘗讀孔子世家觀其言語文章循循然莫不有規矩不敢放言高論言必稱先王然後知聖人憂天下之深也茫乎不知其畔岸而非逺也浩乎不知其津涯而非深也其所言者匹夫匹婦之所共知而所行者聖人有所不能盡也嗚呼是亦足矣使後世有能盡吾説者雖為聖人無難而不能者不失為寡過而已矣子路之勇子貢之辨冉有之智此三者皆天下之所謂難能而可貴者也然三子者每不為夫子之所説顔淵默然不見其所能若無以異于衆人者而夫子亟稱之且夫學聖人者豈必其言之云爾哉亦觀其意之所嚮而已夫子以為後世必有不足行其説者矣必有竊其説而為不義者矣一篇主意在此二段是故其言平易正直而不敢為非常可喜之論要在于不可易也昔者嘗怪李斯事荀卿既而焚滅其書盡變古先聖王之法於其師之道不啻若冦讐及今觀荀卿之書然後知李斯之所以事秦者皆出于荀卿而不足怪也荀卿者喜為異説而不讓敢為高論而不顧者也其言愚人之所驚小人之所喜也子思孟軻世之所謂賢人君子也荀卿獨曰亂天下者子思孟軻也天下之人如此其衆也仁人義士如此其多也荀卿獨曰人性惡桀紂性也堯舜偽也由是觀之意其為人必也剛愎不遜而自許太過彼李斯者又特甚者耳今夫小人之為不善猶必有所顧忌是以夏商之亡桀紂之殘暴而先王之法度禮樂刑政猶未至於絶滅而不可考者是桀紂猶有所存而不敢盡廢也彼李斯者獨能奮然而不顧焚燒夫子之六經烹滅三代之諸侯破壞周公之井田此三句斷李斯之罪可見李斯之罪大此亦必有所恃者矣彼見其師歷詆天下之賢人以自是其愚以為古先聖王皆無足法者不知荀卿特以快一時之論而不自知其禍之至于此也其父殺人報仇其子必且行劫苟卿眀王道述禮樂而李斯以其學亂天下其高談異論有以激之也孔孟之論未嘗異也而天下卒無有及者苟天下無有及者則尚安以求異為哉孔子立言平易正直而不敢為非常可喜之論故其道歷萬世而不可易荀卿喜為異説而不讓敢為高論而不顧歷詆天下之賢聖以自是李斯學其學無忌憚有甚于荀卿者文章軌範卷三
