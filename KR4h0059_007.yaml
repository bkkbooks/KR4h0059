body:
  text: 文章軌範卷七宋謝枋得編小心文乎字集韓文公蘇東坡二公之文皆自莊子覺悟此集可與莊子並驅爭先祭田橫墓文韓愈貞元十一年九月愈如東京道出田橫墓下感橫義高能得士因取酒以祭為文而弔之其辭曰事有曠百世而相感者余不自知其何心非今世之所稀孰為使余歔欷而不可禁余既博觀乎天下曷有庶幾乎夫子之所為死者不復生嗟余去此其從誰當秦氏之失鹿得一士而可王何五百人之擾擾而不能脫夫子於劒鋩豈所寶之非賢抑天命之有常昔闕里之多士孔聖亦云其遑遑苟余行之不迷雖顛沛其何傷自古死者非一夫子至今有耿光跽陳辭而薦酒魂髣佛而來享上梅直講書蘇軾某官執事每讀詩至鴟梟讀書至君奭常切悲周公之不遇及觀史見孔子厄于陳蔡之間而絃歌之聲不絶顔淵仲由之徒相與答問夫子曰匪兕匪虎率彼曠野吾道非耶又何為至此顔淵曰夫子之道至大故天下莫能容雖然不容何病不容然後見君子夫子油然而笑曰回使爾多財吾為爾宰夫天下雖不能容而其徒自足以相樂如此乃今知周公之富貴有不如夫子之貧賤夫以召公之賢以管蔡之親而不知其心則周公誰與樂其富貴而夫子所與共貧賤者皆天下之賢才則亦足以樂乎此矣軾七八嵗時始知讀書聞今天下有歐陽公者其為人如古孟軻韓愈之徒而又有梅公者從之遊而與之上下其議論其後益壯始能讀其文詞想見其為人意其飄然脫去世俗之樂而自樂其樂也方學為對偶聲律之文求升斗之祿自度無以進見于諸公之間來京師逾年未嘗窺其門今年春天下之士羣至於禮部執事與歐陽公實親試之誠不自意獲在第二既而聞之人執事愛其文以為有孟軻之風而歐陽公亦以其能不為世俗之文也而取焉是以在此非左右為之先容非親舊為之請屬而向之十餘年間聞其名而不得見者一朝為知己退而思之人不可以苟富貴亦不可以徒貧賤有大賢焉而為其徒則亦足恃矣苟其僥一時之幸從車騎數十人使閭巷小民聚觀而贊歎之亦何以易此樂也傳曰不怨天不尤人蓋優哉遊哉可以卒嵗執事名滿天下而位不過五品其容色溫而不怒其文章寬厚敦朴而無怨言此必有所樂乎斯道也軾願與聞焉三槐堂記學史記蘇軾天可必乎賢者不必貴仁者不必夀天不可必乎仁者必有後二者將安取𠂻哉吾聞之申包胥曰人衆者勝天天定亦能勝人世之論天者皆不待其定而求之故以天為茫茫善者以怠惡者以肆盜跖之夀孔顔之厄此皆天之未定者也松柏生于山林其始也困于蓬蒿厄于牛羊而其終也貫四時閲千嵗而不改者其天定也善惡之報至于子孫則其定也久矣吾以所見所聞考之其可必也審矣國之將興必有世德之臣厚施而不食其報然後其子孫能與守文太平之主共天下之福故兵部侍郎晉國王公王祐顯于漢周之際歷事太祖太宗文武忠孝天下望以為相而公卒以直道不容于時蓋嘗手植三槐于庭曰吾之子孫必有為三公者已而魏國文正公旦相真宗皇帝于景德祥符之間朝廷清明天下無事之時享其榮名者十有八年今夫寓物于人明日而取之有得有否而晉公修德于身責報于天取必于數十年之後如持左契交手相付吾是以知天之果可必也吾不及見魏公而見其子懿敏公素以直諫事仁宗皇帝出入侍從將帥三十餘年位不滿其德天將復興王氏也歟何其子孫之多賢也世有以晉公比李栖筠者其雄才直氣不相上下而栖筠之子吉甫其孫德裕功名富貴略與王氏等而忠恕仁厚不及魏公父子由此觀之王氏之福蓋未艾也懿敏公之子鞏與吾遊好德而文以世其家吾是以録之銘曰嗚呼休哉魏公之業與槐俱萌封植之勤必世乃成既相真宗四方砥平歸視其家槐隂滿庭吾儕小人朝不謀夕相時射利皇恤厥德庶幾僥幸不種而獲不有君子其何能國王城之東晉公所廬鬱鬱三槐惟德之符嗚呼休哉表忠觀碑蘇軾熙寧十年十月戊子資政殿大學士右諫議大夫知杭州軍事臣抃趙抃言故吳越國王錢氏墳廟及其父祖妃夫人子孫之墳在錢塘者二十有六在臨安者十有一皆蕪穢不治父老過之有流涕者謹按故武肅王鏐始以鄉兵破走黃巢名聞江淮復以八都兵討劉漢宏并越州以奉董昌而自居于杭及昌以越叛則誅昌而并越盡有浙東西之地傳其子文穆王元瓘至其孫忠獻王仁佐遂破李景兵取福州而仁佐之弟忠懿王俶又大出兵攻景以迎周世宗之師其後卒以國入覲三世四王與五代相終始天下大亂豪傑蜂起方是時以數州之地盜名字者不可勝數既覆其族延及于無辜之民罔有孑遺而吳越地方千里帶甲十萬鑄山煮海象犀珠玉之富甲于天下然終不失臣節貢獻相望于道是以其民至於老死不識兵革四時嬉遊歌鼓之聲相聞至于今不廢其有德于斯民甚厚皇宋受命四方僣亂以次削平西蜀江南負其嶮逺兵至城下力屈勢窮然後束手而河東劉氏百戰守死以抗王師積骸為城釃血為池竭天下之力僅乃克之獨吳越不待告命封府庫籍郡縣請吏于朝視去其國如去傳舍其有功于朝廷甚大昔竇融以河西歸漢光武詔右扶風修理其父祖墳塋祠以太牢今錢氏功德殆過于融而未及百年墳廟不治行道傷嗟甚非所以勸奬忠臣慰答民心之義也臣願以龍山廢佛祠曰妙因院者為觀使錢氏之孫為道士曰自然者居之凡墳廟之在錢塘者以付自然其在臨安者以付其縣之淨土寺僧曰道微嵗各度其徒一人使世掌之籍其地之所入以時修其祠宇封殖其草木有不治者縣令丞察之甚者易其人庶幾永終不墮以稱朝廷待錢氏之意臣抃昧死以聞制曰可其妙因院改賜名表忠觀銘曰天目之山苕水出焉龍飛鳳舞萃于臨安篤生異人絶類離倫奮挺大呼從者如雲仰天誓江月星晦蒙強弩射潮江海為東殺宏誅昌奄有吳越金劵玉册虎符龍節大城其居包絡山川左江右湖控引島蠻嵗時歸休以燕父老曄如神人玉帶裘馬四十一年寅畏小心厥篚相望大貝南金五朝昏亂罔堪托國三王相承以待有德既獲所歸弗謀弗咨先王之志我維行之天祚忠孝世有爵邑允文允武子孫千億帝謂守臣治其祠墳毋俾樵牧愧其後昆龍山之陽巋然新宫匪私于錢惟以勸忠非忠無君非孝無親凡百有位視此刻文潘子真云東坡作表忠觀碑王荆公置坐隅葉致逺楊德逢二人在坐有客問曰相公亦喜斯人之作也公曰斯作絶似西漢坐客歎譽不已公笑曰西漢誰人可擬德逢對曰王褒蓋易之也公曰不可草草德逢復曰司馬相如楊雄之流乎公曰相如賦子虛大人洎喻蜀文封禪書耳雄所著太玄法言以準易論語未見其敘事典贍若此也直須與子長馳騁上下坐客又從而贊之公曰畢竟似子長何語坐客悚然公徐曰楚漢以來諸侯王年表也送孟東野序韓愈此篇凡六百二十餘字鳴字四十讀者不覺其繁何也句法變化凡二十九樣有頓挫有升降有起伏有抑揚如層峰疊巒如驚濤怒浪無一句懈怠無一字塵埃愈讀愈可喜大凡物不得其平則嗚草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或灸之金石之無聲或擊之鳴人之于言也亦然有不得已而後言其歌也有思其哭也有懷凡出乎口而為聲者其皆有弗平者乎樂也者鬱于中而泄于外者也擇其善鳴者而假之鳴金石絲竹匏土革木八者物之善鳴者也維天之于時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推奪其必有不得其平者乎其于人也亦然人聲之精者為言文辭之于言又其精者也尤擇其善鳴者而假之鳴其在唐虞咎陶禹其善鳴者也而假之以鳴夔弗能以文辭鳴又假于韶以鳴夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載于詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而逺傳曰天將以夫子為木鐸其弗信矣乎其末也莊周以荒唐之辭鳴于楚楚大國也其亡也以屈原鳴臧孫辰孟軻荀卿以道鳴者也以荀卿儕孟子非其倫臧孫辰何人未見其有道乂與孟子並立安可謂之以道嗚此文公學問偏駁處楊朱墨翟管夷吾晏嬰老聃申不害韓非慎到田駢鄒衍尸佼孫武張儀蘇奏之屬皆以其術鳴秦之興李斯鳴之漢之時司馬遷相如揚雄最其善鳴者也其下魏晉氏鳴者不及于古然未嘗絶也就其善鳴者其聲清以浮其節數以急其辭淫以哀其志弛以肆其為言也亂雜而無章上四句一樣五字若第五句不用九字文勢便庸腐將天醜其德莫之顧耶何為乎不鳴其善鳴者也唐之有天下陳子昂蘇源明元結李白杜甫李觀皆以其所能鳴此六字包括多其存而在下者孟郊東野始以其詩鳴其高出晉魏不懈而及于古其他浸淫乎漢氏矣從吾遊者李翺張籍其尤也三子者之鳴信善鳴矣抑不知天將和其聲而使鳴國家之盛耶抑將窮餓其身思愁其心腸而使自鳴其不幸耶三子者之命則懸于天矣其在上也奚以喜其在下也奚以悲此二句占地步東野之役於江南也有若不釋然者故吾道其命于天者以解之序因送東野作結歸東野身上只兩句此文章之妙前赤壁賦蘇軾此賦學莊騷文法無一句與莊騷相似非超然之才絶倫之識不能為也瀟灑神竒出塵絶俗如乘雲御風而立乎九霄之上俯視六合何物茫茫非惟不挂之齒牙亦不足入其靈臺丹府也壬戌之秋七月既望蘇子與客泛舟遊于赤壁之下清風徐來水波不興舉酒屬客誦明月之詩歌窈窕之章少焉月出于東山之上徘徊于斗牛之間白露橫江水光接天縱一葦之所如凌萬頃之茫然浩浩乎如馮虛御風而不知其所止飄飄乎如遺世獨立羽化而登仙余嘗中秋夜泛舟大江月色水光與天宇合而為一始知此賦之妙於是飲酒樂甚扣舷而歌之歌曰學楚騷文桂棹兮蘭槳擊空眀兮泝流光渺渺兮豫懷望美人兮天一方秋水清見底月在水中謂之空明月光與波俱動謂之流光搖槳曰擊逆水而上曰泝客有吹洞簫者倚歌而和之其聲嗚嗚然如怨如慕如泣如訴餘音嫋嫋不絶如縷舞幽壑之潛蛟泣孤舟之嫠婦蘇子愀然正襟危坐而問客曰何為其然也客曰月明星稀烏鵲南飛此非曹孟德之詩乎西望夏口東望武曷山川相繆鬱乎蒼蒼此非孟德之困于周郎者乎此一假設為客之言曹操詩見文選月明星稀鳥鵲南飛譏蜀先主之南走方其破荆州下江陵順流而東也舳艫千里旌旗蔽空釃酒臨江橫槊賦詩固一世之雄也而今安在哉有感慨況吾與子漁樵于江渚之上侣魚蝦而友麋鹿駕一葉之扁舟舉匏樽以相屬寄蜉蝣于天地渺滄海之一粟哀吾生之須臾羡長江之無窮有感慨挾飛仙以遨遊抱明月而長終知不可乎驟得託遺響于悲風蘇子曰客亦知夫水與月乎逝者如斯而未嘗往也説水盈虛者如彼而卒莫消長也説月蓋將自其變者而觀之則天地曽不能以一瞬自其不變者而觀之則物與我皆無盡也而又何羡乎此一段全學莊子情思且夫天地之間物各有主苟非吾之所有雖一毫而莫取惟江上之清風與山間之明月耳得之而為聲目遇之而成色取之無禁用之不竭是造物者之無盡藏也而吾與子之所共食如食邑之食言享也客喜而笑洗盞更酌殽核既盡杯盤狼籍相與枕藉乎舟中不知東方之既白後赤壁賦蘇軾是嵗十月之望步自雪堂將歸于臨臯二客從豫過黃泥之坂霜露既降木葉盡脫人影在地仰見明月顧而樂之行歌相答已而歎曰有客無酒有酒無殽月白風清如此良夜何客曰今者薄暮舉網得魚巨口細鱗狀似松江之鱸顧安所得酒乎歸而謀諸婦婦曰我有斗酒藏之久矣以待子不時之需於是携酒與魚復逰于赤壁之下江流有聲斷岸千尺山高月小水落石出曽日月之幾何而江山不可復識矣豫乃攝衣而上履巉巖披蒙茸踞虎豹登虬龍攀栖鶻之危巢俯馮夷之幽宫蓋二客不能從焉劃然長嘯草木震動山鳴谷應風起水涌豫亦悄然而悲肅然而恐凛乎其不可留也反而登舟放乎中流聽其所止而休焉時夜將半四顧寂寥適有孤鶴橫江東來翅如車輪玄裳縞衣戞然長鳴掠豫舟而西也須臾客去豫亦就睡夢一道士羽衣蹁躚過臨臯之下揖豫而言曰赤壁之遊樂乎問其姓名俯而不答嗚呼噫嘻我知之矣疇昔之夜飛鳴而過我者非子也耶道士顧笑豫亦驚悟開户視之不見其處阿房宫賦杜牧六王畢四海一蜀山兀阿房出覆壓三百餘里隔離天日驪山北構而西折直走咸陽二川溶溶流入宫墻五步一樓十步一閣廊腰縵回簷牙高琢各抱地勢鈎心鬬角盤盤焉囷囷焉蜂房水渦矗不知其幾千萬落長橋卧波未雲何龍復道行空不霽何虹高低冥迷不知西東歌臺暖響春光融融舞殿冷袖風雨凄凄一日之內一宫之間而氣候不齊妃嬪媵嬙王子皇孫辭樓下殿輦來于秦朝歌夜絃為秦宫人明星熒熒開粧鏡也緑雲擾擾梳曉鬟也渭流漲膩棄脂水也煙斜霧橫焚椒蘭也雷霆乍驚宫車過也轆轆逺聽杳不知其所之也一肌一容盡態極妍縵立逺視而望幸焉有不得見者三十六年燕趙之收藏韓魏之經營齊楚之精英幾世幾年取掠其人倚疊如山一旦不能有輸來其間鼎鐺玉石金塊珠礫棄擲邐迤秦人視之亦不甚惜嗟乎一人之心千萬人之心也秦愛紛奢人亦念其家奈何取之盡錙銖用之如泥沙使負棟之柱多于南畝之農夫架梁之椽多於機上之工女釘頭磷磷多于在庾之粟粒瓦縫參差多于周身之帛縷直欄橫檻多于九土之城郭管絃嘔啞多于市人之言語使天下之人不敢言而敢怒獨夫之心日益驕固戍卒呌函谷舉楚人一炬可憐焦土嗚呼滅六國者六國也非秦也族秦者秦也非天下也嗟夫使六國各愛其人則足以拒秦秦復愛六國之人則遞三世可至萬世而為君誰得而族滅也秦人不暇自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也送李願歸盤谷序韓愈太行之陽有盤谷盤谷之間泉甘而土肥草木叢茂居民鮮少或曰謂其環兩山之間故曰盤或曰是谷也宅幽而勢阻隱者之所盤旋此一節且説盤谷大體友人李願居之願之言曰人之稱大丈夫者我知之矣利澤施于人名聲昭于時坐于廟堂進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賞怒有刑才俊滿前道古今而譽盛德入耳而不煩曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而間居妬寵而負恃爭妍而取憐大丈夫之遇知于天子用力于當世者之所為也此一節形容得志富貴之人吾非惡此而逃之是有命焉不可幸而致也窮居而野處升高而望逺坐茂樹以終日濯清泉以自潔採于山美可茹釣于水鮮可食起居無時惟適所安與其譽于前孰若無毁于其後與其樂于身執若無憂于其心車服不維刀鋸不加理亂不知黜陟不聞大丈夫之不遇于時者之所為也此一節形容隱居退遁之人我則行之承上接下不斷伺候于公卿之門奔走于形勢之途足將進而趑趄口將言而囁嚅處汙穢而不羞觸刑辟而誅戮僥幸于萬一老死而後止者其于為人賢不肖何如也昌黎韓愈聞其言而壯之通篇全舉李願説話自説只數語其實非李願言此又是一格式與之酒而為之歌曰盤之中維子之宫盤之土維子之稼盤之泉可濯可湘盤之阻誰爭子所窈而深廓其有容繚而曲如往而復嗟盤之樂兮樂且無央虎豹逺迹兮蛟龍遁藏鬼神守護兮呵禁不祥飲且食兮壽而康無不足兮奚所望膏吾車兮秣吾馬從子于盤兮終吾生以徜徉文章軌範卷七
