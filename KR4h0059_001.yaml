body:
  text: 宋謝枋得編放膽文侯字集凡學文初要膽大終要心小由麤入細由俗入雅由繁入簡由豪蕩入純粹此集皆麤枝大葉之文本于禮義老于世事合于人情初學熟之開廣其胷襟發舒其志氣但見文之易不見文之難必能放言高論筆端不窘束矣與于襄陽書韓愈七月三日将仕郎守國子四門博士韓愈謹奉書尚書閣下士之能享大名顯當世者此輕莫不有先達之士負天下之望者爲之前焉隱然許于公士之能垂休光照後世者此重亦莫不有後進之士負天下之望者爲之後焉隐然自許莫爲之前雖美而不彰莫爲之後雖盛而不傳是二人者未始不相須也然而千百載乃一相遇焉豈上之人無可援下之人無可推歟何其相須之殷而相遇之踈也以故在下之人負其能不肯諂其上上之人負其位不肯顧其下故高材多戚戚之窮盛位無赫赫之光是二人者之所爲皆過也韓公作文專占地歩如人要在高處立要在平處行要在闊處坐下之人負其能不肯諂其上不害爲君子上之人負其位不肯顧其下不免爲小人高材多戚戚之窮則是君子而安貧賤盛位無赫赫之光則是庸人而茍富貴韓公之所以自處者可謂高矣未嘗干之不可謂上無其人未嘗求之不可謂下無其人愈之誦此言久矣未嘗敢以聞於人側聞閣下抱不世出之才特立而獨行道方而事實巻舒不隨乎時文武惟其所用豈愈所謂其人哉文婉曲有味未聞後進之士有遇知於左右獲禮於門下者豈求之而未得邪文婉曲有味将志存乎立功而事專乎報主雖遇其人未暇禮邪文婉曲有味何其宜聞而久不聞也愈雖不材其自處不敢後於常人閣下将求之而未得歟文婉曲有味古人有言請自隗始史記燕昭王卑身厚幣以招賢者謂郭隗曰齊王因孤之國亂而襲破燕孤極知燕小力少不足以報誠得賢士與共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰古之人君有以千金使㳙人求千里馬者馬已死買其骨五百金而返君大怒㳙人曰死馬且買況生者乎馬今至矣不朞年千里馬至者三今王必欲致士先從隗始况賢於隗者豈逺千里哉于是昭王為隗改築宫而師事之士争趨燕樂毅自魏徃劇辛自趙徃昭王以樂毅爲亞卿任以國政愈今者惟朝夕芻米僕賃之資是急不過費閣下一朝之享而足也如曰吾志存乎立功而事專乎報主雖遇其人未暇禮焉則非愈之所敢知也文婉曲有味世之齪齪者既不足以語之磊落竒偉之人又不能聽焉則信乎命之窮也謹獻舊所爲文一十八首如賜覽觀亦足以知其志之所存結得健愈恐懼再拜後二十九日復上宰相書韓愈三月十六日前鄉貢進士韓愈謹再拜言相公閣下愈聞周公之輔相其急于見賢也方一食三吐其哺方一沐三握其髪當是時天下之賢才皆已舉用九字句姦邪讒佞欺負之徒皆已除去十二字句四海皆已無虞六字句九夷八蠻之在荒服之外者皆已賓貢十五字句天災時變昆蟲草木之妖皆已銷息十四字句天下之所謂禮樂刑政教化之具皆已脩理十七字句風俗皆已敦厚六字句動植之物風雨霜露之所沾被者皆已得宜十七字句休徴嘉瑞麟鳳龜龍之屬皆已備至十四字句七此一段連下九箇皆已字變化様句法字有多少句有長短文有反順起伏頓挫如層瀾驚濤怒波讀者但見其精神不覺其重疊此章法句法也而周公以聖人之才憑叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢于周公者哉不惟不賢於周公而已豈復有賢於時百執事者哉豈復有所計議能補於周公之化者哉連下三箇豈復字變化三様句法讀者但見其精神然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以負成王託周公之意不得於天下之心如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則将不暇食與沐矣豈特吐哺握髮之勤而止哉此一轉有筆力巧在虚字斡旋惟其如是故于今頌成王之德而稱周公之功不衰他人只是頌成王之德而稱周公之功便了必無心力添不衰二字句法便竒今閣下爲輔相亦近耳天下之賢才豈盡舉用姦邪讒佞欺負之徒豈盡除去四海豈盡無虞九夷八蠻之在荒服之外者豈盡賓貢天災時變昆蟲草木之妖豈盡銷息天下之所謂禮樂刑政教化之具豈盡脩理風俗豈盡敦厚動植之物風雨霜露之所沾被者豈盡得宜休徴嘉瑞麟鳳龜龍之屬豈盡備至此一段說今宰相不如周公用豈盡二字對皆已二字亦巧句法變化與上段相對有權度有筆力其所求進見之士雖不足以希望盛德至比於百執事豈盡出其下哉婉曲有法其所稱說豈盡無所補哉本是九箇豈盡字與前段相對說今添兩箇豈盡字亦巧今雖不能如周公之吐哺握髮亦宜引而進之察其所以而進退之不宜黙黙而已也愈之待命四十餘日矣書再上而志不得通足三及門而閽人辭焉惟其昏愚不知逃遁故復有周公之說焉閣下其亦察之古之士三月不仕則弔故出疆必載質然所以重於自進者以其於周不可則去之魯此句八字於魯不可則去之齊二句八字於齊不可則去之宋之鄭之秦之楚也此句十五字章法第三句變文得法今天下一君四海一國舍乎此則夷狄矣去父母之邦矣此一段以古道自處節節占地歩文章絶妙故士之行道者不得于朝則山林而已矣此一轉尤高占地歩山林者士之所獨善自養而不憂天下者之所能安也此一段尤占地歩如有憂天下之心則不能矣故愈每自進而不知愧焉只一句結上自身好筆力書亟上足數及門而不知止焉寧獨如此而已惴惴焉惟不得出大賢之門下是懼若下惟恐不得出大賢之門下便弱了今不下恐字安頓是懼二字在末句法竒而健亦惟少垂察焉瀆冒威尊惶懼無已愈再拜代張籍與李淛東書韓愈月日前某官某謹東向再拜寓書淛東觀察使中丞李公閣下籍聞議論者皆云方今居方伯連帥之職坐一方得專制於其境内者起句便不凡不弱惟閣下心事犖犖與俗輩不同籍固以藏之胸中矣近者閣下從事李協律翺到京師籍於李君友也不見六七年聞其至馳徃省之問無恙外不暇出一言且先賀其得賢主人李君曰子豈盡知之乎吾将盡言之數日籍益聞所不聞籍私獨喜常以爲自今以後不復有如古人者於今忽有之退自悲不幸兩目不見物無用於天下胸中雖有如識家無錢財寸歩不能自致今去李中丞五千里何由致其身於其人之側開口一吐出胸中之竒乎因飲泣不能語既數日復自奮曰一轉無所能人乃宜以盲廢有所能人雖盲當廢於俗輩不當廢于行古人之道者此一轉巧淛水東七州二轉户不下數十萬不盲者何限李中丞取人固當問其賢不賢不當計其盲與不盲也此一轉又巧當今盲于心者皆是三轉若籍自謂獨盲于目爾其心則能别是非若賜之坐而問之其口固能言也幸未死實欲一吐出心中所知見閣下能信而致之於門耶籍又善于古詩使其心不以憂衣食亂句健閣下無事時一致之座側使跪進其所有閣下憑几而聽之未必不如聽吹竹彈絲敲金擊石也夫盲者業專於藝必精故樂工皆盲籍倘可與此輩比並乎使籍誠不以蓄妻子憂飢寒亂心此一轉妙有錢以濟醫藥其盲未甚庻㡬復見天地日月因得不廢則自今至死之年皆閣下之賜閣下濟之以已絶之年賜之以既盲之視句法妙其㤙輕重大小籍宜如何報也結得妙閣下裁之度之籍慚靦載拜上張僕射書韓愈九月一日愈再拜受牒之明日在使院中有小吏持院中故事節目十餘事來示愈其中不可者有自九月至明年二月之終皆晨入夜歸非有疾病事故輙不許出當時以初受命不敢言古人有言曰人各有能有不能若此者非愈之所能也用事變化當如此抑而行之必發狂疾上無以承事于公忘其将所以報德者下無以自立喪失其所以爲心夫如是則安得而不言凡執事之擇于愈者非謂其能晨入夜歸也必将有以取之茍有以取之雖不晨入夜歸其所取者猶在也下之事上不一其事上之使下不一其事量力而任之度才而處之其所不能不彊使爲是故爲下者不獲罪于上爲上者不得怨于下矣孟子有云今之諸侯無大相過者以其皆好臣其所教而不好臣其所受教今之時與孟子之時又加逺矣皆好其聞命而奔走者不好其直已而行道者聞命而奔走者好利者也直已而行道者好義者也未有好利而愛其君者未有好義而忘其君者此一段分明是以孟子之言譏張公斡轉得婉曲可法今之王公大人惟執事可以聞此言惟愈于執事也可以此言進此一章辭太直兩句救得好愈䝉幸于執事其所從舊矣若寛假之使不失其性加待之使足以爲名寅而入盡辰而退申而入終酉而退率以爲常亦不廢事天下之人聞執事之于愈如是也必皆曰執事之好士也如此八字句執事之待士以禮如此九字句執事之使人不枉其性而能有容如此十五字句執事之欲成人之名如此十字句執事之厚于故舊如此九字句連下五箇如此字句法長短錯綜凡四變此章法也又将曰韓愈之識其所依歸也如此十一字句韓愈之不謟屈于富貴之人如此十三字句韓愈之賢能使其主待之以禮如此十四字句义連下三箇如此字長短錯綜此章法也則死于執事之門無悔也一段文勢如狂瀾浩波只此一句截㫁有氣力若使隨行而入逐隊而趨言不敢盡其誠道有所屈于已天下之人聞執事之于愈如此皆曰執事之用韓愈哀其窮収之而已耳韓愈之事執事不以道利之而已耳前段說話此一反只用六句頓挫波瀾絶妙茍如是雖日受千金之賜一嵗九遷其官感㤙則有之矣将以稱于天下曰知已則未也受人之㤙與受人之知不同感㤙易感知已難故曰士爲知已者死此兩句下得妙伏惟哀其所不足矜其愚不錄其罪察其辭而垂仁採納焉此三句無𦂳要句法亦不茍且愈恐懼再拜與陳給事書韓愈陳止齋作論雙關文法皆本于此愈再拜愈之獲見于閣下有年矣始者亦嘗辱一言之譽貧賤也衣食於奔走頓挫不得朝夕繼見句法其後閣下位益尊伺候于門墻者日益進夫位益尊則賤者日隔伺候于門墻者日益進則愛博而情不專愈也道不加脩而文日益有名夫道不加脩則賢者不與文日益有名則同進者忌始之以日隔之疏加之以不專之望以不與者之心聽忌者之說由是閣下之庭無愈之迹矣後十九日復上宰相書韓愈愈聞之蹈水火者之求免于人也字法不惟其父兄子弟之慈愛然後呼而望之也字法将有介於其側者雖其所憎怨茍不至乎欲其死者則将大其聲疾呼而望其仁之也字法彼介于其側者聞其聲而見其事不惟其父兄子弟之慈愛然後徃而全之也雖有所憎怨茍不至于欲其死者則将狂奔盡氣句法濡手足句法焦毛髮句法救之而不辭也若是者何哉其勢誠急而其情誠可悲也章法愈之彊學力行字法有年矣愚不惟道字法之險夷行且不息字法以蹈于窮餓之水火以蹈水火譬喻彊學力行愚不惟道之險夷行且不息此是下字巧處其既危且亟矣大其聲而疾呼矣閣下其亦聞而見之矣其将徃而全之歟抑将安而不救歟有來言于閣下者曰句法有觀溺於水而爇于火者有可救之道而終莫之救也章法閣下且以爲仁人乎哉章法不然若愈者亦君子之所宜動心者也或謂愈子言則然矣宰相則知子矣如時不可何愈竊謂之不知言者誠其材能不足以當賢相之舉爾若所謂時者固在上位者之爲爾非天之所爲也此即賈誼云非天之所爲人之所設也前五六年時宰相薦聞尚有自布衣䝉抽擢者與今豈異時哉且今節度觀察使及防禦營田諸小使等尚得自舉判官無間于已仕未仕者字法況在宰相吾君所尊敬者而曰不可乎古之進人者或取于盜或舉於管庫今布衣雖賤猶足以方於此情隘辭蹙句法不知所裁亦惟少垂憐焉此書譬喻格從孟子來應科目時與人書韓愈月日愈再拜天池之濵大江之濆有恠物焉盖非常鱗凡介品彚之匹儔也其得水變化風雨上下于天不難也其不及水盖尋常尺寸之間耳無高山大陵曠塗絶險爲之間隔也譬喻應宏詞科然其窮涸不能自致乎水爲獱獺之笑者盖十八九矣如有力者哀其窮而運轉之盖一舉手一投足之勞也然是物也負其異于衆也且曰爛死於沙泥吾寧樂之若俛首帖耳摇尾而乞憐者非我之志也是以有力者遇之熟視之若無覩也其死其生固不可知也今又有有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎其哀之命也其不哀之命也知其在命而且鳴號之者亦命也愈今者實類于是一篇皆是譬喻只一句愈今者實類於是收拾此文法最妙是以忘其疎愚之罪而有是說焉閣下其亦憐察之答陳商書韓愈愈白辱惠書語高而㫖深三四讀尚不能通曉茫然増愧赧又不以其淺弊無過人知識且諭以所守幸甚愈敢不吐露情實然自識其不足補吾子之所須也齊王好竽有求仕於齊者操瑟而徃立王之門三年不得入叱曰吾瑟鼔之能使鬼神上下吾鼔瑟合軒轅氏之律吕譬喻學孟子客罵之曰王好竽而子鼓瑟瑟雖工如王之不好何是所謂工於瑟而不工於求齊也文婉曲有味今舉進士於此世求利祿行道於此世而爲文必使一世人不好得無與操瑟立齊門者比歟文雖工不利於求求不得則怒且怨不知君子必爾爲不也文婉曲有味故區區之心每有來訪者皆有意於不肖者也畧不辭讓遂盡言之惟吾子諒察愈白送石洪處士序韓愈河陽軍節度御史大夫烏公爲節度之三月求士於從事之賢者有薦石先生者公曰先生何如曰先生居嵩邙瀍榖之間冬一裘夏一葛此是衣不說出衣字食朝夕飯一盂蔬一盤看他說衣食二事變化句法甚竒人與之錢則辭請與出遊未嘗以事免勸之仕則不應坐一室左右圖書與之語道理三字句辨古今事當否六字句論人高下四字句事後當成敗五字句若河決下流而東注若駟馬駕輕車就熟路而王良造父古善御者爲之先後也一句長以二句合爲一句若燭照數計而龜卜也一句短如此設譬喻作句法文勢有頓挫有起伏便有波瀾大夫曰先生有以自老無求於人其肯爲某來耶從事曰大夫文武忠孝求士爲國不私于家方今冦聚于垣師環其疆農不耕收財粟殫亡吾所處地歸輸之塗治法征謀宜有所出先生仁且勇若以義請而强委重焉其何說之辭此段文勢似緩慢若逐句㸃檢無一句懈怠軟弱無一字懈怠軟弱於是譔書詞具馬幣卜日以授使者求先生之廬而請焉看他妝撰大夫從事賔主問答之言如此巧先生不告於妻子不謀于朋友冠帶出見客拜受書禮于門内宵則沐浴戒行李載書册問道所由告行于常所來徃叙事句句有法晨則畢至張上東門外張供張也如今筵㑹鋪張設之類酒三行且起有執爵而言者曰大夫真能以義取人先生真能以道自任决去就爲先生别若只下以道自任作一句人皆能之今添决去就三字句法便竒又酌而祝曰凡去就出處何常惟義之歸遂以爲先生夀又酌而祝曰使大夫恒無變其初無務富其家而飢其師無甘受佞人而外敬正士十字句無味于諂言五字句惟先生是聽以能有成功保天子之寵命此一章句法長短不齊文有頓挫好章法又祝曰使先生無圖利于大夫而私便其身圖句法先生起拜祝辭曰敢不敬蚤夜以求從祝規此一句是左傳句法于是東都之士咸知大夫與先生果能相與以有成也此一句結得絶妙有萬鈞筆力遂各爲歌詩六韻遣愈爲之序云與之語道理辨古今事當否論人高下事後當成敗若河决下流而東注若駟馬駕輕車就熟路而王良造父爲之先後也此一章譬喻文法最竒韓文公作文千變萬化不可捉摸如雷電鬼神使人不可測其作韋侍講盛山二詩序云夫儒者之于患難茍非其自取之其拒而不受于懐也若築河堤以障屋霤其容而消之也若水之于海冰之于夏日其玩而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲況一不快于考功盛山一出入息之間哉此段分明是送石處士序譬喻文法恐人識破便變化三様句分作三段此公平生以恠恠竒竒自負其作文要使人不可測識如陳后山送參寥序云其議古今張人情貌肖否言之從違詩之精粗若水赴壑阪走丸倒囊出物鷙鳥舉而風逼之也若升高視下爬痒而鑑貌也此一段文亦新竒不蹈襲只是被人看破全是學韓文公送石洪處士序文送温處士赴河陽軍序韓愈文有氣力有光燄頓挫豪宕讀之快人意可以發人才思伯樂一過冀北之野而馬羣遂空夫冀北馬多于天下伯樂雖善知馬安能空其羣耶解之者曰吾所謂空非無馬也無良馬也伯樂知馬遇其良輒取之羣無留良焉茍無良雖謂無馬不爲虚語矣東都固士大夫之冀北也恃才能深藏而不市者洛之北涯曰石生其南涯曰温生大夫烏公以鈇鉞鎮河陽之三月句新竒以石生爲才以禮爲羅羅而致之幕下未數月也以温生爲才于是以石生爲媒以禮爲羅又羅而致之幕下東都雖信多才士朝取一人焉拔其尤暮取一人焉拔其尤自居守河南尹以及百司之執事與吾輩二縣之大夫政有所不通事有所可疑奚所諮而處焉士大夫之去位而巷處者誰與嬉逰小子後生于何考德而問業焉縉紳之東西行過是都者無所禮於其廬此一段四節四様句法頓挫起伏有波瀾有峰巒文法之妙若是而稱曰大夫烏公一鎮河陽而東都處士之廬無人焉豈不可也夫南面而聽天下其所託重而恃力者惟相與将耳相爲天子得人於朝廷将爲天子得文武士於幕下求内外無治不可得也愈縻于兹不能自引去資二生以待老今皆爲有力者奪之其何能無介然于懐耶生既至拜公于軍門其爲吾以前所稱爲天下賀以後所稱爲吾致私怨于盡取也留守相公首爲四韻詩歌其事愈因推其意而序之送楊少尹序韓愈文有氣力有光燄頓挫豪宕讀之快人意可以發人才思昔疏廣受二子以年老一朝辭位而去于時公卿設供帳祖道都門外車數百兩道傍觀者多嘆息泣下共言其賢見前漢書疏廣傳漢史既傳其事而後世工畫者又圖其迹至今照人耳目赫赫若前日事國子司業楊君巨源方以能詩訓後進一旦以年滿七十亦白丞相去歸其鄉世常說古今人不相及今楊與二疏其意豈異也予忝在公卿後遇病不能出不知楊侯去時城門外送者㡬人車㡬兩馬㡬疋道傍觀者亦有歎息知其爲賢與否而太史氏又能張大其事爲傳繼二疏踪跡不落莫否見今世無工畫者而畫與不畫固不論也然吾聞楊侯之去丞相有愛而惜之者白以爲其都少尹不絶其祿又爲歌詩以勸之京師之長于詩者亦屬而和之又不知當時二疏之去有是事否古今人同不同未可知也中世大夫以官爲家罷則無所于歸楊侯始冠舉於其鄉歌鹿鳴而來也今之歸指其樹曰某樹吾先人之所種也某水某丘吾童子時所釣逰也鄉人莫不加敬誡子孫以楊侯不去其鄉為法所謂鄉先生没可祭於社者其在斯人歟其在斯人歟送高閑上人序韓愈此序談詭放蕩學荘子文文雖學荘子又無一句蹈襲茍可以寓其巧智使機應于心不挫於氣則神完而守固雖外物至不膠於其心堯舜禹湯治天下養叔治射庖丁治牛師曠治音聲扁鵲治病僚之于丸秋之于奕伯倫之于酒樂之終身不厭奚暇外慕夫外慕徙業者皆不造其堂不嚌其胾者也徃時張旭善草書不治他技喜怒窘窮憂悲愉佚怨恨思慕酣醉無聊不平有動于心必于草書焉發之觀于物見山水崖谷鳥獸蟲魚草木之花實日月列星風雨水火雷霆霹靂歌舞戰鬬天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世今閑之於草書有旭之心哉不得其心而逐其跡未見其能旭也爲旭有道利害必明無遺錙銖情炎于中利欲鬬進有得有喪勃然不釋然後一决于書而後旭可㡬也今閑師浮屠氏一死生解外膠是其爲心必泊然無所起其于世必淡然無所嗜泊與淡相遭頹墮委靡潰敗不可收拾則其于書得無象之然乎然吾聞浮屠人善幻多技能此轉妙閑如通其術則吾不能知矣送殷員外使回鶻序韓愈唐受天命爲天子凡四方萬國不問海内外無小大咸臣順于朝時節貢水土百物大者特來小者附集元和睿聖文武皇帝既嗣位悉治方内就法度十二年詔曰四方萬國惟回鶻于唐最親奉職尤謹尊中國得體丞相其選宗室四品一人持節徃賜君長告之朕意尊中國得體又選學有經法通知時事者一人與之爲貳由是殷侯侑自太常博士遷尚書虞部員外郎兼侍御史朱衣象笏承命以行朝之大夫莫不出餞酒半右庻子韓愈執盞言曰殷大夫今人適數百里出門惘惘有離别可憐之色持被入直三省丁寧顧婢子語刺刺七迹切不能休今子使萬里外國獨無㡬微出于言面豈不真知輕重大丈夫哉只語此一段丞相以子應詔真誠知人矣士不通經果不足用于是相屬爲詩以道其行原毁韓愈古之君子其責已也重以周其待人也輕以約重以周故不怠輕以約故人樂爲善聞古之人有舜者其爲人也仁義人也求其所以爲舜者責于已曰彼人也予人也彼能是而我乃不能是蚤夜以思去其不如舜者就其如舜者聞古之人有周公者其爲人也多才與藝人也求其所以爲周公者責于已曰彼人也予人也彼能是而我乃不能是蚤夜以思去其不如周公者就其如周公者舜大聖人也後世無及焉周公大聖人也後世無及焉是人也乃曰不如舜不如周公吾之病也是不亦責于已者重以周乎其于人也曰彼人也能有是是足爲良士矣能有是是足爲藝人矣取其一不責其二即其新不究其舊恐恐然惟懼其人不得爲善之利一善易脩也一藝易能也其于人也乃曰能有是是亦足矣曰能善是是亦足矣是不亦待于人者輕以約乎今之君子則不然其責人也詳其待已也廉詳故人難於爲善廉故自取也少已未有善曰我善是是亦足矣已未有能曰我能是是亦足矣外以欺于人内以欺于心未少有得而止矣是不亦待于已者已廉乎其于人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不計其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責于人者已詳乎夫是之謂不以衆人待其身而以聖人望于人吾未見其尊已也雖然爲是者有本有原怠與忌之謂也怠者不能脩而忌者畏人脩吾嘗試之矣嘗試語于衆曰某良士某良士其應者必其人之與也不然則其所疏逺不與同其利者也不然則其畏也不若是强者必怒于言懦者必怒于色矣又嘗語于衆曰某非良士某非良士其不應者必其人之與也不然則其所疎逺不與同其利者也不然則其畏也不若是强者必說於言懦者必說于色矣是故事脩而謗興德高而毁來嗚呼士之處此世而望名譽之光道德之行難矣将有作於上者得吾說而存之其國家可㡬而理矣此篇曲盡人情巧處妙處在假託他人之言辭摸寫世俗之情状熟于此必能作論文章軌範巻一
