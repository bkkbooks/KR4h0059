body:
  text: 文章軌範巻四宋謝枋得編小心文相字集此集文章古得道理强以清明正大之心發英華果銳之氣筆勢無敵光燄燭天學者熟之作經義作策必擅大名于天下原道韓愈博愛之謂仁五字句行而宜之之謂義七字句由是而之焉之謂道八字句足乎已無待於外之謂德十字句開端四句四様句法此文章家巧處仁與義爲定名道與德爲虚位上句長此兩句短便頓挫成文故道有君子有小人而德有凶有吉此所以謂之虚位老子之小仁義非毁之也其見者小也當看荘子坐井而觀天曰天小者非天小也彼以煦煦爲仁孑孑爲義其小之也則宜此語出老荘之書其所謂道道其所道非吾所謂道也其所謂德德其所德非吾所謂德也凡吾所謂道德云者合仁與義言之也天下之公言也老子所謂道德云者去仁與義言之也一人之私言也此一篇斷盡聖人之道與老子之道不同處更以荘子胠篋馬蹄篇觀之周道衰孔子没火于秦三字句黄老于漢四字句佛于晉宋齊梁魏隋之間十字句其言道德仁義云者不入于楊則入于墨不入于墨則入于老不入于老則入于佛入于彼必出于此孟子說歸楊歸儒今變歸字爲入文公去陳言自撰新語只是把古人文章變化入者主之出者奴之入者附之出者汙之入于楊墨佛老者必出于聖人之學主異端者必以聖人之道爲奴附異端者必以聖人之道爲汙噫後之人其欲聞仁義道德之說孰從而聽之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也爲孔子者習聞其說樂其誕而自小也亦曰吾師亦嘗師之云爾不惟舉之于口而又筆之于書噫後之人雖欲聞仁義道德之說其孰從而求之甚矣人之好怪也不求其端而訊其末惟怪之欲聞古之爲民者四今之爲民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盜也好句法古之時人之害多矣有聖人者立然後教之以相生相養之道此一段見得天地間不可無聖人之道聖人之道有功于人非佛老可及爲之君爲之師驅其蟲蛇禽獸而處其中土寒然後爲之衣飢然後爲之食木處而顛土處而病也然後爲之宫室爲之工以贍其器用爲之賈以通其有無爲之醫藥以濟其夭死爲之葬埋祭祀以長其㤙愛爲之禮以次其先後爲之樂以宣其湮鬱爲之政以率其怠勌爲之刑以鋤其强梗相欺也爲之符璽斗斛權衡以信之相奪也爲之城郭甲兵以守之害至而爲之偹患至而爲之防此一段連下十七箇爲之字變化九様句法起伏頓挫如層峯叠巒如驚濤巨浪讀者快心暢意不覺其下字之重叠此章法也今其言曰聖人不死大盜不止剖斗折衡而民不争嗚呼其亦不思而已矣文勢有頓挫如古之無聖人人之類滅久矣此數句送文暢序同意可併看何也頓挫無羽毛鱗介以居寒熱也無𤓰牙以争食也是故君者出令者也第一句四字臣者行君之令而致之民者也第二句十字民者出粟米麻絲作器皿通貨財以事其上者也第三句十七字由短入長此是章法君不出令則失其所以爲君第一句七字臣不行君之令而致之民則失其所以爲臣七字民不出粟米麻絲作器皿通貨財以事其上則誅第三句二字此是章法今其法曰必棄而君臣去而父子禁而相生相養之道以求其所謂清浄寂滅者嗚呼其亦幸而出于三代之後而不見黜於禹湯文武周公孔子也其亦不幸而不出于三代之前而不見正于禹湯文武周公孔子也帝之與王其號各殊其所以爲聖一也夏葛而冬裘渴飲而飢食其事雖殊其所以爲智一也今其言曰曷不爲太古之無事佛老之言是亦責冬之裘者曰曷不爲葛之之易也責飢之食者曰曷不爲飲之之易也傳曰古之欲明明徳于天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲脩其身者先正其心欲正其心者先誠其意援大學之言然則古之所謂正心誠意者将以有爲也今也欲治其心而外天下國家滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事極論佛老之禍天下孔子之作春秋也諸侯用夷禮則夷之夷而進於中國則中國之好句法經曰夷狄之有君不如諸夏之亡詩曰戎狄是膺荆舒是懲今也舉夷狄之法而加之先王之教之上幾何其不胥而爲夷也好句法夫所謂先王之教者何也此一轉妙博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待于外之謂德其文詩書易春秋其法禮樂刑政其民士農工賈此三句短其位君臣父子師友賓主昆弟夫婦此一句長其服麻絲其居宫室此二句短其食粟米蔬果魚肉此一句又長其爲道易眀其爲教易行也此一句合二句爲一句連下九箇其字變化六様句法與前章爲之字相應此是章法是故以之爲己則順而祥以之爲人則愛而公以之爲心則和而平以之爲天下國家無所處而不當上三句一様句法第四句便變化十三字一句此章法也是故生則得其情死則盡其常郊焉而天神假字法廟焉而人鬼享字法曰斯道也何道也文有収拾有關鎻曰斯吾之所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉此兩句絶妙六句直下來如良馬下峻嶺如輕舟下長湍若無一句攔截便不成文章荀與楊也擇焉而不精語焉而不詳文有頓挫由周公而上上而爲君故其事行由周公而下下而爲臣故其說長程伊川云周公沒聖人之道不行孟軻沒聖人之學不傳道不行百世無善治學不傳千載無真儒其說本于此然則如之何而可也此一轉有萬鈞筆力不如此斡轉如何収拾結得曰不塞不流不止不行佛老之道不塞聖人之道不流佛老之道不止聖人之道不行句法最巧人其人句法火其書句法廬其居句法明先王之道以道之此是句法鰥寡孤獨癈疾者有養也此一句出禮運其亦庻乎其可也一篇皆大議論結得尤有力結得似軟而實健言有盡而意無窮與孟簡尚書書韓愈此書多有巧心妙手批不盡須是面說來示云有人傳愈近少信奉釋氏者此傳者妄也潮州時有一老僧號大顛頗聰眀識道理逺地無可與語者故自山召至州郭留十數日實能外形骸以理自勝不爲事物侵亂與之語雖不盡解要自胸中無滯礙自以爲難得因與來徃及祭神至海上遂造其廬及來袁州留衣服爲别乃人之情非崇信其法求福田利益也此以下文有氣力有光燄孔子云丘之禱久矣凡君子行已立身自有法度聖賢事業具在方册可效可師仰不愧天俯不愧人内不愧心積善積惡殃慶自各以其類至何有去聖人之道捨先王之法而從夷狄之教以求福利也詩不云乎豈弟君子求福不回傳又曰不爲威惕不爲利疚假如釋氏能與人爲禍福非守道君子之所懼也況萬萬無此理且彼佛者果何人哉其行事類君子耶小人耶若君子也必不妄加禍于守道之人如小人也其身已死其鬼不靈天地神祗昭布森列非可誣也又肯令其鬼行胸臆作威福于其間哉進退無所據而信奉之亦且惑矣此一段說佛必不能禍守道之人理强辭直有氣力有光燄且愈不助釋氏而排之者其亦有說孟子云今天下不之楊則之墨楊墨交亂而聖賢之道不眀聖賢之道不眀則三綱淪而九法斁禮樂崩而夷狄横幾何不爲禽獸也此一段先鋪張楊墨爲禍于天下甚大可見孟子有功于天下後世甚大故曰能言距楊墨者聖人之徒也揚子雲曰古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢且将數百年以至于秦卒滅先王之法燒除經書坑殺學士天下遂大亂及秦滅漢興且百年尚未知脩明先王之道其後始除挾書之律稍求亡書招學士經雖少得尚皆殘缺十亡二三故學士多老死新者不見全經不能盡知先王之亊各以所見爲守分離乖隔不合不公二帝三王羣聖人之道於是大壊後之學者無所尋逐以至于今泯泯也其禍出于楊墨肆行而莫之禁故也孟子雖賢聖不得位空言無施雖切何補此四句似抑而貶之然頼其言而今之學者尚知宗孔氏崇仁義貴王賤霸而已此二句又揚而張之其大經大法皆亡滅而不救壊爛而不収所謂存十一于千百安在其能廓如也此四句又抑而貶之然向無孟氏則皆服左袵而言侏離矣此一句又揚而張之只此一句發眀孟子之功何必多言文勢如力重九鼎亦從論語孟子說管仲變化來故愈嘗推尊孟氏以爲功不在禹下者爲此也此一段發眀孟子闢楊墨之功有抑揚冇翕張漢氏以來此以下說此時冇釋老之害羣儒區區脩補百孔千瘡隨亂隨失其危如一髪引千鈞綿綿延延寖以微滅于是時也而唱釋老于其間鼓天下之衆而從之嗚呼其亦不仁甚矣釋老之害過于楊墨韓愈之賢不及孟子孟子不能救之于未亡之前而韓愈乃欲全之于已壊之後嗚呼其亦不量其力且見其身之危莫之救以死也韓文公推尊孟子以爲功不在禹下實自推尊以爲功不在孟子下此一段以孟子與已對說丈勢抑揚輕重雖曰賢不及孟子其實自許其功過于孟子雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在傍又安得因一摧折自毁其道以從于邪也籍湜輩雖屢指教張籍皇甫湜皆公門人不知果能不叛去否辱吾兄眷厚而不獲承命惟増慙懼死罪死罪聖賢立言與庸衆人異貶一人不必多言只一字一句貶之其辱不可當褒一人不必多言只一字一句褒之其榮不可當孔子褒管仲只四句一匡天下民到于今受其賜㣲管仲吾其披髮左衽矣孟子學孔子者也許百里奚只三句相秦而顯其君于天下可傳於後世不賢而能之乎韓文公學孔孟者也褒孟子初只兩句然頼其言而今學者尚知宗孔氏崇仁義貴王賤霸而已終只兩句向無孟氏則皆服左衽而言侏離矣正與孔子褒管仲之語同歐陽公作蘇老泉墓誌語云眉山在西南數千里外公父子一日隐然名動京師而蘇氏之文章遂擅天下亦得褒奨法上高宗封事胡銓肝膽忠義心術明白思慮深長讀其文想見其人真三代以上人物朱文公謂可與日月争光中興奏議此爲第一謹按王倫本一狎邪小人市井無賴此八字的當王倫出身本末見王倫賣國之由頃緣宰相無識遂舉以使金惟務詐誕欺罔天聽驟得美官天下之人切齒唾罵今者無故誘致北使以詔諭江南爲名是欲臣妾我也好句法是欲劉豫我也好句法劉豫臣事金人南面稱王自以爲子孫帝王萬世不拔之業一旦豺狼改慮捽而縛之父子爲虜商鍳不逺而倫又欲陛下效之夫天下者祖宗之天下也陛下所居之位祖宗之位也奈何以祖宗之天下爲敵人之天下以祖宗之位爲敵人藩臣之位陛下一屈膝則祖宗廟社之靈盡為草萊祖宗數百年之赤子盡爲僕𨽻朝廷宰執盡爲倍臣天下士大夫皆當裂冠毁冕反顔事仇異時豺狼無厭之求安知不加我無禮如劉豫也哉夫三尺童子至無知也指仇讎而使之拜則怫然怒今金人則仇讎也堂堂天朝相率而拜仇讎曾童孺之所羞而陛下忍爲之耶倫之議乃曰我一屈膝則梓宫可還太后可復淵聖可歸中原可得嗚呼自變故以來主和議者誰不以此啗陛下哉而卒無一騐是敵之情僞已可知矣陛下尚不覺悟竭民膏血而不恤忘國大讐而不報含垢忍恥舉天下而臣之甘心焉就令敵决可和盡如倫議天下後世謂陛下何如主況金人變詐百出而倫又以奸邪濟之梓宫决不可還太后决不可復淵聖决不可歸中原决不可得而此膝一屈不可復伸國勢陵夷不可復振可爲痛哭流涕長太息也向者陛下間關海道危如纍卵當時尚不肯北面臣事況今國勢稍張諸将盛銳士卒思奮只如頃者强敵陸梁僞豫入冦固嘗敗之於襄陽敗之于淮上敗之於渦口敗之於淮隂較之前日蹈海之危已萬萬矣儻不得已而遂至於用兵則我豈遽出金人下哉今無故而反臣之欲屈萬乘之尊下北靣之拜三軍之士不戰而氣亦索此魯仲連所以義不帝秦非惜夫帝秦之虚名借夫天下大勢有所不可也今内而百官外而軍民萬口一談皆欲食倫之肉謗議洶洶陛下不聞正恐一旦變作禍且不測臣竊謂不斬王倫國之存亡未可知也雖然倫不足道也秦檜以腹心大臣而亦爲之陛下有堯舜之資檜不能致陛下如唐虞而欲導陛下如石晉近者禮部侍郎曾開等引古誼以折之檜乃厲聲曰侍郎知故事我獨不知則檜之遂非很愎已自可見而乃建白令臺諌從臣僉議可否是乃畏天下議已而令臺諌從臣共分謗耳有識之士皆以爲朝廷無人吁可惜哉孔子曰微管仲吾其被髮左衽矣夫管仲霸者之佐耳尚能奮九合之功爲衣冠之㑹秦檜大國之相也反驅東南之民歸漢北之鄉則檜也不唯陛下之罪人實管仲之罪人矣孫近附㑹檜議遂得叅知政事天下望治有如飢渇而近伴食中書漫不可否事檜曰敵可講和近亦曰可和檜曰天子當拜近亦曰當拜臣嘗至政事堂三發問而近不答但曰已令臺諌侍從議矣嗚呼叅賛大政徒取充位如此有如敵騎長驅尚能折衝禦侮耶臣竊謂秦檜孫近亦可斬也臣備貟樞屬義不與檜等共戴天區區之心願斬三人頭竿之藁街然後羈留金使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有赴東海而死耳寧能處小朝廷求活耶潮州韓文公廟碑蘇軾後生熟讀此等文章下筆便有氣力有光彩匹夫而爲百世師一言而爲天下法起句健章子厚猶以爲褒文公太過似孔子廟記是皆有以參天地之化關盛衰之運其生也有自來其逝也有所爲起得健接亦不弱故申吕自嶽降傅說爲列星古今所傳不可誣也孟子曰我善養吾浩然之氣是氣也寓于尋常之中而塞乎天地之間卒然遇之王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辯是孰使之然哉其必有不依形而立不恃力而行不待生而存不隨死而亡者矣句法好故在天爲星辰在地爲河嶽幽則爲鬼神而明則復爲人此理之常無足怪者此是的確之論自東漢以來道喪文弊異端並起歴唐貞觀開元之盛輔以房杜姚宋而不能救得君行道如房杜姚宋不能救而文公獨能之獨韓文公起布衣談笑而麾之天下靡然從公復歸于正盖三百年於此矣褒文公出此㡬句文起八代之哀道濟天下之溺忠犯人主之怒而勇奪三軍之帥此豈非叅天地關盛衰浩然而獨存者乎盖嘗論天人之辨以謂人無所不至惟天不容僞智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精誠能開衡嶽之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇甫鎛李逢吉之謗能信于南海之民廟食百世而不能使其身一日安于朝廷之上盖公之所能者天也其所不能者人也始潮人未知學公命進士趙德爲之師自是潮之士皆篤于文行延及齊民至于今號稱易治信乎孔子之言君子學道則愛人小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉此數句合祭法見文公廟不是淫祠而廟在刺史公堂之後民以出入爲艱前太守欲請諸朝作新廟不果元祐五年朝散郎王君滌來守是邦凡所以養士治民者一以公爲師民旣悦服則出令曰願新公廟者聽民讙趨之卜地于州城之南七里期年而廟成或曰公去國萬里而謫于潮不能一嵗而歸沒而有知其不眷戀于潮也審矣軾曰不然公之神在天下者如水之在地中無所徃而不在也而潮人獨信之深思之至焄蒿悽愴若或見之譬如鑿井得泉而曰水專在是豈理也哉元豐元年詔封公昌黎伯故牓曰昌黎伯韓文公之廟潮人請書其事于石因爲作詩以遺之使歌以祀公其辭曰公昔騎龍白雲鄉手披雲漢分天章天孫爲織雲錦裳飄然乘風來帝旁下與濁世掃粃糠西逰咸池畧扶桑草木衣被昭回光追逐李杜參翺翔汗流籍湜走且僵滅沒倒景不可望作書詆佛譏君王要觀南海窺衡湘歴舜九嶷弔英皇祝融先驅海若藏約束鮫鱷如驅羊鈞天無人帝悲傷謳吟下招遣巫陽犦牲雞卜羞我觴於粲荔丹與蕉黄公不少留我涕滂翩然被髮下大荒東坡平生作詩不經意意思淺而味短獨此詩與司馬温公神道碑表忠觀碑銘三詩竒絶皆刻意苦思之文也上田樞宻書蘇洵天之所以與我者豈偶然哉一篇之骨在此一句說天之所以與我者占得地歩高亦從論語中夫子言語變化來堯不得以與丹朱舜不得以與商均而瞽瞍不得奪諸舜第三句如此變化始有力發于其心出于其言見于其事確乎其不可易也聖人不得以與人父不得奪諸其子於此見天之所以與我者不偶然也夫其所以與我者必有以用我也我知之不得行之不以告人天固用之我實置之其名曰棄天自卑以求幸其言自小以求用其道天之所以與我者何如而我如此也其名曰褻天棄天我之罪也褻天亦我之罪也不棄不褻而人不我用不我用之罪也其名曰逆天然則棄天褻天者其責在我逆天者其責在人在我者吾将盡吾力之所能爲者以塞夫天之所以與我之意而求免夫天下後世之譏在人者吾何知焉吾知免夫一身之責之不暇而暇爲人憂乎哉孔子孟軻之不遇老于道途而不倦不愠不怍不沮者夫固知夫責之所在也衛靈魯哀齊宣梁惠之徒不足相與以有爲也我亦知之矣抑將盡吾心焉耳吾心之不盡吾恐天下後世無以責夫衛靈魯哀齊宣梁惠之徒而彼亦将有以辭其責也然則孔子孟軻之目将不瞑於地下矣夫聖人賢人之用心也固如此如此而生如此而死如此而貧賤如此而富貴升而爲天沉而爲淵流而爲川止而爲山彼不預吾事吾事畢矣切怪夫後之賢者不能自處其身也此一段有力飢寒困窮之不勝而號于人此是說文公嗚呼使吾誠死于飢寒困窮耶則天下後世之責将必有在彼其身之責不自任以爲憂而我取而加之吾身不亦過乎今洵之不肖何敢自列于聖賢然其心亦有所甚不自輕者何則天下之學者孰不欲一蹴而造聖人之域然及其不成也求一言之㡬乎道而不可得也千金之子可以貧人可以富人非天之所與雖以貧人富人之權求一言之㡬乎道不可得也天子之宰相可以生人可以殺人非天之所與雖以生人殺人之權求一言之㡬乎道不可得也此一段筆力尤髙今洵用力于聖人賢人之術亦已久矣其言語其文章雖不識其果可以有用于今而傳于後與否獨怪夫得之之不勞方其致思于心也若或起之得之心而書之紙也若或相之夫豈無一言之㡬于道者乎千金之子天子之宰相求而不得者一旦在已故其心有以自負或者天其亦有以與我也曩者見執事于益州當時之文淺狹可笑飢寒困窮亂其心而聲律記問又從而破壊其體不足觀也已數年來退居山野自分永棄與世俗日疎闊得以大肆其力於文章詩人之優柔騷人之清深孟韓之温醇遷固之雄剛孫呉之簡切投之所向無不如意嘗試以爲董生得聖人之經其失也流而爲迂鼂錯得聖人之權其失也流而爲詐有二子之才而不流者其惟賈生乎惜乎今之世愚未見其人也作策二道曰審勢審敵作書十篇曰權書洵有山田一頃非凶嵗可以無飢力耕而節用亦足以自老不肖之身不足惜而天之所與者不忍棄且不敢褻也有收拾有鎻執事之名滿天下天下之士用與不用在執事故敢以所謂策二道權書十篇爲獻平生之文逺不可多致有洪範論史論十篇近以獻内翰歐陽公度執事與之朝夕相從議天下之事則斯文也其亦庻乎得陳于前矣若夫言之可用與其身之可貴與否者執事事也執事責也於洵何有哉責字有照應有闗鎻上范司諫書歐陽修當與韓文公諍臣論並觀月日具官謹齋沐拜書司諫學士執事前月中得進奏吏報云自陳州召至闕拜司諫即欲爲一書以賀多事匆卒未能也起不立冒司諌七品官耳於執事得之不爲喜而獨區區欲一賀者誠以諌官者天子之得失一時之公議繫焉今世之官自九卿百執事外至一郡縣吏非無貴官大職可以行其道也然縣越其封郡逾其境雖賢守長不得行以其有守也吏部之官不得理兵部鴻臚之卿不得理光祿以其有司也若天下之得失生民之利害社稷之大計惟所見聞而不繫職司者獨宰相可行之諌官可言之爾故士學古懐道者仕于時不得爲宰相必爲諫官諌官雖卑與宰相等天子曰不可宰相曰可天子曰然宰相曰不然坐乎廟堂之上與天子相可否者宰相也天子曰是諌官曰非天子曰必行諌官曰必不可行立于殿陛之前與天子争是非者諌官也宰相尊行其道諌官卑行其言言行道亦行也九卿百司郡縣之吏守一職者任一職之責宰相諌官繫天下之事亦任天下之責然宰相九卿而下失職者受責于有司諌官之失職也取譏于君子有司之法行乎一時君子之譏著之簡册而昭眀垂之百世而不泯甚可懼也夫七品之官任天下之責懼百世之譏豈不重耶非材且賢者不能也近執事始被召于陳州洛之士大夫相與語曰我識范君知其材也其來不爲御史必爲諌官及命下果然則又相與語曰我識范君知其賢也他日聞有立天子陛下直辭正色面争廷論者非他人必范君也拜命以來翹首企足竚乎有聞而卒未也竊惑之豈洛之士大夫能料于前而不能料于後也将執事有待而爲也昔韓退之作争臣論以譏陽城不能極諌卒以諫顯人皆謂城之不諫盖有待而然退之不識其意而妄譏脩獨以爲不然當退之作論時城爲諫議大夫已五年後又二年始廷論陸贄及沮裴延齡作相欲裂其麻纔兩事耳當德宗時可謂多事矣授受失宜叛将强臣羅列天下又多猜忌進任小人於此之時豈無一事可言而須七年耶當此之時豈無急于沮延齡論陸贄兩事耶謂宜朝拜官而夕奏疏也幸而城爲諫官七年適遇延齡陸贄事一諫而罷以塞其責向使止五年六年而遂遷司業是終無一言而去也何所取哉今之居官者率三嵗而一遷或一二嵗甚者半嵗而遷也此又非可以待乎七年也今天子躬親庻政化理清明雖爲無事然自千里詔執事而拜是官者豈不欲聞正議而樂讜言乎今未聞有所言說使天下知朝廷有正士而彰吾君有納諫之眀也夫布衣韋帶之士窮居草茅坐誦書史常恨不見用及用也又曰彼非我職不敢言或曰我位猶卑不得言得言矣又曰我有待是終無一人言也可不惜哉此一段合人情范公見之必感動伏惟執事思天子所以見用之意懼君子百世之譏一陳昌言以塞重望且解洛士大夫之惑則幸甚幸甚有收拾學韓文歐陽公文章爲一代宗師然藏鋒斂鍔韜光況馨不如韓文公之竒竒怪怪可喜可愕學韓不成亦不庸腐學歐不成必無精彩獨上范司諫書朋黨論春秋論縱囚論氣力健光燄長少年熟讀可以發才氣可以生議論文章軌範巻四
