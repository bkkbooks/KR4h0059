body:
  text: 文章軌範巻二宋謝枋得編放膽文王字集辯難攻擊之文雖厲聲色雖露鋒鋩然氣力雄健光燄長逺讀之令人意强而神爽初學熟此必雄于文千萬人塲屋中有司亦當刮目争臣論韓愈或問諌議大夫陽城於愈可以爲有道之士乎哉乎哉二字連下乃疑辭學廣而聞多不求聞於人也行古人之道居於晉之鄙晉之鄙人薫其德而善良者㡬千人薫字從孟子炙字變化來大臣聞而薦之天子以爲諌議大夫人皆以爲華陽子不色喜居於位五年矣此句便含不諌意榮字變爲華無喜色三字變爲不色喜視其德如在草野彼豈以富貴移易其心哉先下此數句下章要用恒其德貞夫子凶以貶之愈應之曰第一段是易所謂恒其德貞而夫子凶者也用前言結變惡得爲有道之士乎哉直貶在易蠱之上九云不事王侯高尚其事蹇之六二則曰王臣蹇蹇匪躬之故夫不以所居之時不一而所蹈之德不同也若蠱之上九居無用之地而致匪躬之節以蹇之六二在王臣之位而高不事之心此一段六句是雙關文法韓文公專喜用之可以爲法則冒進之患生應無用匪躬一句曠官之刺興應王臣不事一句志不可則而尤之終不無也蠱上九象曰志可則也蹇之六二象曰終無尤也今陽子實一匹夫在位二字句不爲不久矣聞天下之得失六字句不爲不熟矣天子待之四字句不爲不加矣此三句上異下同學孟子文法而未嘗一言及于政視政之得失若越人視秦人之肥瘠忽焉不加喜戚于其心問其官則曰諫議也二字問其祿則曰下大夫之秩也五字問其政則曰我不知也三字此三句上同下異學孟子文法有道之士固如是乎哉貶得婉且吾聞之第二段有官守者不得其職則去有言責者不得其言則去此兩句是孟子説今陽子以爲得其言乎哉得其言而不言與不得其言而不去無一可者也陽子将爲祿仕乎第三段問得婉古之人有云仕不爲貧而有時乎爲貧謂祿仕者也宜乎辭尊而居卑辭富而居貧若抱關擊柝者可也此一段亦孟子說看他添字減字變換前言便不陳腐盖孔子嘗爲委吏矣嘗爲乘田矣亦不敢曠其職必曰㑹計當而已矣必曰牛羊遂而已矣此一段亦孟子說看他添字減字變換前言便不陳腐若陽子之秩祿不爲卑且貧章章明矣而如此其可乎哉貶得婉或曰否非若此也第四段夫陽子惡訕上者惡爲人臣招音翹其君之過而以爲名者故雖諌且議使人不得而知焉書曰爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之德夫陽子之用心亦若此者愈應之曰若陽子之用心如此兹所謂惑者矣入則諌其君出則不使人知者大臣宰相之事非陽子之所宜行也夫陽子本以布衣隱于蓬蒿之下主上嘉其行誼擢在此位官以諌爲名誠宜有以奉其職使四方後代知朝廷有直言骨鯁之臣天子有不僣賞從諌如流之美庻巖穴之士聞而慕之束帶結髮願進于闕下而伸其辭說致吾君于堯舜熈鴻號于無窮也若書所謂則大臣宰相之事非陽子之所宜行也𦂳要重複提掇得醒學史記擅弓文法且陽子之心将使君人者惡聞其過乎是啟之也或曰第五段陽子之不求聞而人聞之不求用而君用之不得已而仕守其道而不變何子過之深也愈曰自古聖人賢士皆非有心求于聞用也閔其時之不平人之不義得其道不敢獨善其身而必以兼濟天下也孜孜矻矻死而後已故禹過家門不入孔席不暇煖而墨突不得黔彼二聖一賢者有權衡豈不知自安佚之爲樂哉誠畏天命而悲人窮也夫天授人以賢聖才能豈使自有餘而已誠欲以補其不足者也耳目之于身也耳司聞而目司見聽其是非視其險易然後身得安焉聖賢時人之耳目也時人聖賢之身也且陽子之不賢則将役于賢以奉其上矣若果賢則固畏天命而閔人窮也惡得以自暇逸乎哉或曰吾聞君子不欲加諸人而惡訐以爲直者若吾子之論直則直矣無乃傷于德而費于辭乎前五段攻擊陽子直是說他無逃避處末一段假或人之辭以攻已其言甚峻此文法最髙好盡言以招音翹人過國武子之所以見殺于齊也吾子其亦聞乎愈曰人來攻擊者甚急看他分解得好君子居其位則思死其官上一句說陽子未得位則思脩其辭以明其道下一句說自身我将以明道也非以爲直而加人也且國武子不能得善人而好盡言于亂國是以見殺傳曰惟善人能受盡言謂其聞而能改之也韓文公所以敢攻擊陽子者亦靠得陽子是一箇善人必能受盡言必不怒不怨子告我曰陽子可以爲有道之士也今雖不能及已陽子将不得爲善人乎到底不肯以有道許陽子畢竟陽子是箇好人如何泯沒得好處此末句結得絶妙蘓東坡作范増論攻得他無逃避處結句乃云雖然增高帝之所畏也増不去項羽不亡増亦人傑也哉正是學韓子諱辯韓愈愈與李賀書勸賀舉進士賀舉進士有名與賀争名者毁之曰賀父名晉肅賀不舉進士爲是勸之舉者爲非聽者不察唱而和之同然一辭皇甫湜曰若不明白子與賀且得罪愈曰然律曰二名不偏諱釋之者曰謂若言徴不稱在言在不稱徴是也律曰不諱嫌名釋之者曰謂若禹與雨丘與蓲之類是也今賀父名晉肅賀舉進士爲犯二名律乎爲犯嫌名律乎此二句設疑問之不直說破不犯諱此章法也父名晉子不得舉進士若父名仁子不得爲人乎甚妙夫諱始于何時作法制以教天下者非周公孔子歟周公作詩不諱文王名昌詩曰克昌厥後孔子不偏諱二名孔子母名徴在有曰宋不足徴又曰某在斯春秋不譏不諱嫌名如衛桓公名完康王釗之孫實爲昭王曾參之父名晳曾子不諱昔如曰昔者吾友又曰裼裘而弔周之時有騏期漢之時有杜度此其子宜何如諱将諱其嫌遂諱其姓乎將不諱其嫌者乎此二句又設疑問之不直說破甚妙漢諱武帝名徹爲通不聞又諱車轍之轍爲某字也諱吕后名雉爲野雞不聞又諱治天下之治爲某字也今上章及詔不聞諱滸勢秉機也滸近太祖廟諱勢近太宗廟諱秉近代祖廟諱機近𤣥宗廟諱太祖名虎太宗名世民代祖名昞𤣥宗名隆基惟宦官宫妾乃不敢言諭及機以爲觸犯以諭爲近代宗廟諱以機爲近𤣥宗廟諱此一轉最高罵得時人諱嫌名者太毒士君子立言行事宜何所法守也今考之于經質之于律稽之于國家之典賀舉進士爲可耶爲不可耶又設疑問凡事父母得如曾參可以無譏矣作人如周公孔子亦可以止矣今世之士不務行曾參周公孔子之行而諱親之名則務勝于曾參周公孔子亦見其惑也夫周公孔子曾參卒不可勝勝周公孔子曾參乃比于宦官宫妾則是宦官宫妾之孝於其親賢於周公孔子曾參者耶一篇辯明理强氣直意高辭嚴最不可及者有道理可以折服人矣全不直說破盡是設疑佯爲兩可之辭待智者自擇此别是一様文法此辯文法從孟子來桐葉封弟辯柳宗元七節轉換義理明瑩意味悠長字字經思句句著意無一字懈怠亦子厚之文得意者古之傳者有言成王以桐葉與小弱弟戯小弱弟叔虞也曰以封汝周公入賀王曰戯也周公曰天子不可戯乃封小弱弟於唐史記晉世家文吾意不然王之弟當封耶周公宜以時言于王不待其戯而賀以成之也不當封耶周公乃成其不中之戯以地以人與小弱弟者爲之主其得爲聖乎第一節此是正理正論開下段辯難且周公以王之言不可茍焉而已必從而成之耶設有不幸王以桐葉戯婦寺亦将舉而從之乎第二節又難凡王者之德在行之何若設未得其當雖十易之不爲病要于其所當不可使易也而況以其戯乎第三節若戯而必行之是周公教王遂過也第四節此一轉尤妙破得好吾意周公輔成王宜以道從容優樂要歸之大中而已必不逢其失而爲之辭第五節又不當束縛之馳驟之使若牛馬然急則敗矣第六節此一段是正理且家人父子尚不以此自克況號爲君臣者耶是特小丈夫􅆙􅆙者之事非周公所宜用故不可信或曰封唐叔史佚成之第七節此一結尤高與韓愈論史書柳宗元辯難攻擊之文要人心服子厚此書文公不復辯亦理勝也前獲書言史事云具與劉秀才書及今乃見書藁私心甚不喜與退之徃年言史事甚大謬若書中言退之不宜一日在館下安有探宰相意以爲茍以史筆榮一韓退之耶若果爾退之豈宜虚受宰相榮已而冒居館下近宻地食奉養役使掌故利紙筆爲私書取以供子弟費古之志于道者不宜若是且退之以爲記錄者有刑禍避不肯就尤非也史以名爲褒貶猶且恐懼不敢爲設使退之爲御史中丞大夫其褒貶成敗人愈益顯其宜恐懼尤大也則又将揚揚入臺府美食安坐行呼唱于朝廷外衢而已耶在御史猶爾設使退之爲宰相生殺出入升黜天下士其敵益衆則又将揚揚入政事堂美食安坐行呼唱于内庭外衢而已耶則何以異不爲史而榮其號利其祿者也又言不有人禍則有天刑若以罪夫前古之爲史者然亦甚惑凡居其位思直其道道茍直雖死不可回也如回之莫若亟去其位孔子之困於魯衛陳宋蔡齊楚者其時暗諸侯不能以也其不遇而死不以作春秋故也當其時雖不作春秋孔子猶不遇而死也若周公史佚雖紀言書事猶遇且顯也又不得以春秋爲孔子累范曄悖亂雖不爲史其族亦誅司馬遷觸天子喜怒班固不檢下崔浩沽其直以鬬暴虜皆非中道左丘明以疾盲出于不幸子夏不爲史亦盲不可以是爲戒其餘皆不出此是退之宜守中道不忘其直無以他事自恐退之之恐惟在不直不得中道刑禍非所恐也凡言二百年文武事多有誠如此者今退之曰我一人也何能明則同職者又所云若是後來繼今者又所云若是人人皆曰我一人則卒誰能紀傳之耶如退之但以所聞知孜孜不敢怠同職者及後來繼今者亦各以所聞知孜孜不敢怠則庻㡬不墜使卒有眀也不然徒信人口語每每異辭日以滋久則所云磊磊軒天地者未必不沉没且亂雜無可考非有志者所忍恣也果有志豈當待人督責廹蹙然後爲官守耶又凡鬼神事渺茫荒或無可準眀者所不道退之之智而猶懼如此今學如退之辭如退之好言論如退之慷慨自謂正直行行焉如退之猶所云若是則唐之史述其卒無可託乎眀天子賢宰相得史才如此而又不果甚可痛哉退之宜更思可爲速爲果卒以爲恐懼不敢則一日可引去又何以云行且謀也今人當爲而不爲又誘館中他人及後生者此大惑已不勉已而欲勉人難矣哉晉文公守原議柳宗元字字經思句句有法無一字一句懈怠此柳文得意者也晉文公既受原於王原邑乃周襄王所賜難其守問寺人勃鞮宦官以畀趙衰賢臣余謂守原政之大者也所以承天子樹霸功致命諸侯不宜謀及媟近以忝王命而晉君擇大任不公議于朝而私議于宫不博謀于卿相而獨謀于寺人雖或哀之賢足以守國之政不爲敗而賊賢失政之端由是滋矣況當其時不乏謀議之臣乎狐偃爲謀臣先軫将中軍晉君疏而不咨外而不求乃卒定於内豎其可以爲法乎且晉君将襲齊桓之業以翼天子乃大志也然而齊桓任管仲以興進豎刁以敗則獲原啟疆適其始政僖公二十五年所以觀視諸侯也而乃背其所以興跡其所以敗然而能霸諸侯者以土則大以力則彊以義則天子之册也左傳僖公二十八年王命尹氏及王子虎内史叔興父䇿命晉侯爲侯伯誠畏之矣烏能得其心服哉其後景監秦孝公時宦官得以相衛鞅商鞅𢎞石𢎞恭石顯二人漢宣帝時宦官得以殺望之蕭望之誤之者晉文公也嗚呼得賢臣以守大邑此指文公則問非失問舉非失舉也然猶羞當時陷後代如此此指秦漢況問與舉又兩失之者其何以救之哉余故著晉君之罪以附春秋許世子止趙盾之義朋黨論歐陽修在諌院進臣聞朋黨之說自古有之惟幸人君辨其君子小人而已此三句是一篇主意大凡君子與君子以同道爲朋小人與小人以同利爲朋此自然之理也然臣謂小人無朋惟君子則有之此轉最妙其故何哉小人所好者利祿也所貪者貨財也當其同利之時暫相黨引以爲朋者僞也初說小人無朋又生僞朋二字尤妙及其見利則争先或利盡則交疎甚者反相賊害雖其兄弟親戚不能相保故臣謂小人無朋其暫爲朋者僞也君子則不然所守者道義所行者忠信所惜者名節以之脩身則同道而相益以之事國則同心而共濟終始如一此君子之朋也故爲人君者但當退小人之僞朋用君子之真朋則天下治矣堯之時小人共工驩兠等四人爲一朋君子八元元善也八愷愷和也十六人爲一朋蒼舒隤敳檮戭大臨尨降庭堅仲容叔達謂之八愷伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍謂之八元舜佐堯退四凶小人之朋而進元愷君子之朋堯之時天下大治及舜自爲天子而臯䕫稷契二十二人並列于朝更相稱美更相推讓凡二十二人爲一朋而舜皆用之天下亦大治書曰紂有臣億萬惟億萬心周有臣三千惟一心紂之時億萬人各異心可謂不爲朋矣然紂以此亡國周武王之臣三千人爲一大朋而周用以興後漢獻帝時盡取天下名士囚禁之目爲黨人漢之黨錮有三君八俊八顧八及八㕑有張儉范滂李膺郭泰䓁爲之魁及黄巾賊起張角漢室大亂後方悔悟桓靈獻三朝盡解黨人而釋之然已無救矣唐之晚年漸起朋黨之論前世李德裕之黨多君子牛僧孺之黨多小人謂之牛李黨及昭宗時盡殺朝之名士咸投之黄河曰此軰清流可投濁流而唐遂亡矣朱全忠時盡殺黨人于白馬驛夫前世之主能使人人異心不爲朋莫如紂能禁絶善人之朋莫如漢獻帝能誅戮清流之朋莫如唐昭宗之世然皆亂亡其國天子看到此三句豈不感悟更相稱美推讓而不自疑莫如舜之二十二人舜亦不疑而皆用之然而後世不誚舜爲二十二人朋黨所欺而稱舜爲聰明之聖者以其能辨君子與小人也周武之世舉其國之臣三千人共爲一朋自古爲朋之多且大莫如周然周由此而興者人雖多而不厭也嗟乎治亂興亡之迹爲人君者可以鑒矣只二句結絶妙仁宗時杜衍富弼韓琦范仲淹位執政歐陽修余靖王素蔡襄爲諌官欲盡革弊政共致太平陳執中章得象王拱辰魚周詢等不恱謀傾陷君子首擊去館職名士十三人杜富韓范不安相繼去國小人創朋黨之說欲盡去善類藍先震進朋黨論歐陽公憂之既上疏論杜富韓范皆公忠愛國又上朋黨論以破邪說仁宗感悟漢元帝二年𢎞恭石顯奏蕭望之周堪劉更生朋黨請召致廷尉上初立不省廷尉爲獄也可其奏後赦望之欲倚以爲相恭顯復白望之不悔過懐怨望非頗詘望之于牢獄塞其怏怏心則聖朝無以施恩厚遂飲鴆自殺漢桓帝九年宦官教張成弟子牢脩告李膺等養太學游士結諸郡生徒共爲部黨誹訕朝廷疑亂風俗逮捕下黄門獄北寺獄所引二百餘人禁錮終身又儒學有行義者宦官皆指爲朋人死徙廢禁又六七百人竇武陳蕃劉淑爲三君君者言一世之所宗也李膺荀昱杜宻王暢劉祐魏朗趙典朱㝢爲八俊俊者言人之英也郭泰范滂尹勲巴肅宗慈夏馥蔡衍羊陟爲八顧顧者言能以德行引人者也張儉翟超岑晊范康劉表陳翔孔昱檀敷爲八及及者言其能導人追宗者也度尚張邈劉儒胡母班秦周蕃嚮王章王考爲八㕑㕑者言能以財救人者也唐昭宗天祐三年貶裴樞崔逺獨孤損陸扆王溥趙崇王賛等其餘皆指爲浮薄貶逐無虛日縉紳一空禹稷契臯陶垂殳斨伯與益朱虎熊羆伯夷䕫龍四岳十二牧總二十二人縱囚論歐陽修文有氣力有光燄熟讀之可發人才氣善於立論信義行于君子而刑戮加于小人刑入于死者乃罪大惡極此又小人之尤甚者也寧以義死不苟幸生而視死如歸此又君子之尤難者也方唐太宗之六年錄大辟囚三百餘人縱使還家約其自歸以就死是以君子之難能責其小人之尤者以必能也其囚及期而卒自歸無後者是君子之所難而小人之所易也此豈近於人情哉或曰罪大惡極誠小人矣及施㤙德以臨之可使變而爲君子盖㤙德入人之深而移人之速有如是者矣曰太宗之爲此所以求此名也然安知夫縱之去也不意其必來以兾免所以縱之乎又安知夫被縱而去也不意其自歸而必獲免所以復來乎夫意其必來而縱之是上賊下之情也意其必免而復來是下賊上之心也吾見上下交相賊以成此名也烏有所謂施恩德與夫知信義者哉不然太宗施德於天下於兹六年矣不能使小人不爲極惡大罪而一日之㤙能使視死如歸而存信義此又不通之論也然則何爲而可曰縱而來歸殺之無赦而又縱之而又來則可知爲㤙德之致爾然此必無之事也若夫縱而來歸而赦之可偶一爲之爾若屢爲之則殺人者皆不死是可爲天下常法乎不可爲常者其聖人之法乎是以堯舜三王之治必本于人情不立異以爲高不逆情以干譽春秋論歐陽修春秋書趙盾弑其君夷臯左傳謂趙穿弑靈公趙盾爲正卿亡不越竟古境字下同反不討賊故董狐書曰趙盾弑其君左傳又曰孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也爲法受惡惜也越竟乃免弑逆大惡也其爲罪也莫贖其于人也不容其在法也無赦法施于人雖小必謹況舉大法而加大惡乎既輙加之又輙赦之則自侮其法而人不畏春秋用法不如是之輕易也三子說春秋左丘明公羊高穀梁赤書趙盾以不討賊故加之大惡而以盾非實弑則又復見乎經以明盾之無罪是輒加之而輒赦之爾以盾爲無弑心乎其可輕以大惡加之以盾不討賊情可責而宜加之乎則其後頑然未嘗討賊既不改過以自贖何爲遽赦使同無罪之人其于進退皆不可此非春秋意也趙穿弑君大惡也盾不討賊不能爲君復讐而失刑于下二者輕重不較可知就使盾爲可責然穿焉得免也今免首罪爲善人使無辜者受大惡此决知其不然也春秋之惡使爲惡者不得幸免疑似者有所辨明此所謂是非之公也據三子之說初靈公欲殺盾盾走而免穿盾族也遂弑公而盾不討其迹渉于與弑矣此疑似難明之事聖人尤當求情責實而明白之使盾果有弑心乎則自然罪在盾矣不得曰爲法受惡而稱其賢也使果無弑心乎則當爲之辨明必先正穿之惡使罪有所歸然後責盾縱賊則穿之大惡不可幸而免盾疑似之迹獲辨而不討之責亦不得辭如此則是非善惡明矣今爲惡者獲免而疑似之人陷于大惡此决知其不然也若曰盾不討賊有幸弑之心與自弑同故寧舍穿而罪盾此乃逆詐用情之吏矯激之爲爾非孔子忠恕春秋以王道治人之法也孔子患舊史是非錯亂而善惡不明所以脩春秋就令舊史如此其肯從而不正之乎其肯從而稱美又教人以越境逃惡乎此可知其謬傳也問者曰然則夷臯孰弑之曰孔子所書是矣趙盾弑其君也今有一人焉父病躬進藥而不嘗又有一人焉父病而不躬進藥而二父皆死又有一人焉操刄以殺其父使吏治之是三人者其罪同乎曰雖庸吏猶知其不可同也躬藥而不嘗者有愛父之心而不習于禮是可哀也無罪之人爾不躬進藥者誠不孝矣雖無愛父之心然未有弑父之意使善治獄者蔽之猶當與操刄殊科況以躬藥之孝反與操刃者同其罪乎此庸吏之所不爲也然則許世子止實不嘗藥則孔子决不書曰弑君孔子書弑君則止决非不嘗藥難者曰聖人借止以垂教爾對曰不然夫所謂借止垂教者不過欲人之知嘗藥爾聖人一言明以告人則萬世法也何必加孝子以大惡之名而嘗藥之事卒不見于文使後世但知止爲弑君而莫知藥之當嘗也教未可垂而已陷人于大惡矣聖人垂教不如是之迂也果曰罪止不如是之刻也難者曰曷爲盾復見于經許悼公曷爲書葬曰弑君之臣不見經此自三子說爾果聖人法乎悼公之葬且安知其不討賊而書葬也自止以弑見經後四年呉敗許師又十有八年當魯定公之四年許男始見于經而不名許之書于經者畧矣止之事跡不可得而知也難者曰三子之說非其臆出也其得于所傳如此然則所傳者皆不可信乎曰傳聞何可盡信公羊榖梁以尹氏卒爲正卿左氏以尹氏卒爲隱母一以爲男子一以爲婦人得于所傳者盖如此是可盡信乎文章軌範巻二
